    const j=await res.json();if(!res.ok)throw new Error(j.error?.message||('HTTP '+res.status));
    const cand=j.candidates?.[0];const text=(cand?.content?.parts||[]).map(p=>p.text||'').join('').trim()||'(sem resposta)';
    let sources=null;const ch=cand?.groundingMetadata?.groundingChunks;if(ch&&ch.length)sources=ch.filter(c=>c.web).map(c=>({uri:c.web.uri,title:c.web.title}));

/* ---------- mesclar duplicados ---------- */
function _stripHtml(h){const d=document.createElement('div');d.innerHTML=h||'';return (d.textContent||'').replace(/\s+/g,' ').trim();}
function _repointLinks(oldId,newId){[data.teses,data.sumulas].forEach(arr=>(arr||[]).forEach(t=>{if(t.links&&t.links.includes(oldId))t.links=[...new Set(t.links.map(x=>x===oldId?newId:x))];}));}
function _mergeNodeInto(keep,dup){
  const kt=_stripHtml(keep.content),dt=_stripHtml(dup.content);
  if(dt){ if(!kt)keep.content=dup.content; else if(kt!==dt)keep.content=(keep.content||'')+'<hr>'+(dup.content||''); }
  keep.materials=keep.materials||{};
  MAT_TYPES.forEach(m=>{keep.materials[m.key]=keep.materials[m.key]||[];const ex=new Set(keep.materials[m.key].map(x=>x.id));((dup.materials&&dup.materials[m.key])||[]).forEach(it=>{if(!ex.has(it.id)){keep.materials[m.key].push(it);ex.add(it.id);}});});
  keep.children=keep.children||[];(dup.children||[]).forEach(c=>keep.children.push(c));
  _repointLinks(dup.id,keep.id);
}
function _dedupeNodes(arr){
  const map={},order=[];
  (arr||[]).forEach(n=>{const k=(n.name||'').trim().toLowerCase();if(map[k])_mergeNodeInto(map[k],n);else{map[k]=n;order.push(k);}});
  const out=order.map(k=>map[k]);
  out.forEach(n=>{if(n.children&&n.children.length)n.children=_dedupeNodes(n.children);});
  return out;
}
function mergeDuplicates(){
  confirmModal('Mesclar duplicados','Juntar cadernos de mesmo nome e, dentro de cada um, subpastas/níveis com nome idêntico? Conteúdo, materiais e subníveis são combinados e os vínculos de teses/súmulas são preservados. Não pode ser desfeito.',()=>{
    let before=0;data.notebooks.forEach(nb=>before+=1+countNodes(nb));
    // 1) mescla cadernos de mesmo nome
    const map={},order=[];
    data.notebooks.forEach(nb=>{const k=(nb.name||'').trim().toLowerCase();if(map[k]){const keep=map[k];if(/^[^a-z]*$/.test(keep.name)&&/[a-z]/.test(nb.name))keep.name=nb.name;keep.children=(keep.children||[]).concat(nb.children||[]);if(nb.ai&&nb.ai.messages&&nb.ai.messages.length){keep.ai=keep.ai||{messages:[]};keep.ai.messages=keep.ai.messages.concat(nb.ai.messages);}}else{map[k]=nb;order.push(k);}});
    data.notebooks=order.map(k=>map[k]);
    // 2) mescla subpastas/níveis duplicados em cada caderno
    data.notebooks.forEach(nb=>{nb.children=_dedupeNodes(nb.children||[]);});
    let after=0;data.notebooks.forEach(nb=>after+=1+countNodes(nb));
    cur.nbId=data.notebooks[0]?.id||null;cur.nodeId=null;
    persist();closeModal();toast((before-after)+' item(ns) duplicado(s) mesclado(s).','ok');
    if(cur.screen==='cadernos')renderCadernos();else go('cadernos');
  });
}

/* ============================================================
   GOOGLE PICKER — anexar arquivos do Drive (PDF/áudio/vídeo/imagem)
   ============================================================ */
let _pickerReady=false;
function openDrivePicker(nbId,nodeId){
  if(!drive.connected){toast('Conecte o Google Drive primeiro (⚙).','err');openSettings();return;}
  const key=settings.pickerApiKey||settings.geminiApiKey||'';
  if(!key){toast('Defina uma Chave de API do Google (Picker) em ⚙ Configurações.','err');openSettings();return;}
  if(typeof gapi==='undefined'){toast('Google API ainda carregando — tente novamente em instantes.','err');return;}
  if(!_pickerReady){gapi.load('picker',()=>{_pickerReady=true;openDrivePicker(nbId,nodeId);});return;}
  ensureToken().then(()=>{
    const appId=(settings.clientId||'').split('-')[0];
    const view=new google.picker.DocsView(google.picker.ViewId.DOCS).setIncludeFolders(true).setSelectFolderEnabled(false);
    const b=new google.picker.PickerBuilder()
      .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
      .addView(view)
      .setOAuthToken(drive.token)
      .setDeveloperKey(key)
      .setTitle('Anexar do Google Drive')
      .setCallback(d=>pickerCb(d,nbId,nodeId));
    if(appId)b.setAppId(appId);
    b.build().setVisible(true);
  }).catch(e=>toast('Erro ao abrir o seletor: '+e.message,'err'));
}
function pickerCb(d,nbId,nodeId){
  if(!d||d[google.picker.Response.ACTION]!==google.picker.Action.PICKED)return;
  const f=findNode(nbId,nodeId);if(!f)return;
  f.node.materials.arquivo=f.node.materials.arquivo||[];
  const docs=d[google.picker.Response.DOCUMENTS]||[];
  docs.forEach(doc=>f.node.materials.arquivo.push({
    id:uid(),type:'arquivo',
    driveId:doc[google.picker.Document.ID],
    title:doc[google.picker.Document.NAME],
    mimeType:doc[google.picker.Document.MIME_TYPE],
    url:doc[google.picker.Document.URL],
    createdAt:Date.now()
  }));
  persist();
  if(cur.nodeId===nodeId&&cur.screen==='cadernos'){cur.tab='materiais';renderDetail();}else renderTree();
  toast(docs.length+' arquivo(s) anexado(s) do Drive.','ok');
}

function exportBackup(){
  const payload={app:'codex-magistratura',version:1,exportedAt:new Date().toISOString(),theme:settings.theme||null,geminiModel:settings.geminiModel||null,data:data};
  let blob;try{blob=new Blob([JSON.stringify(payload)],{type:'application/json'});}catch(e){toast('Falha ao gerar backup.','err');return;}
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='codex-magistratura-backup-'+pvToday()+'.json';document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1200);
  toast('Backup baixado.','ok');
}
function importBackup(){
  const inp=document.createElement('input');inp.type='file';inp.accept='application/json,.json';
  inp.onchange=()=>{const f=inp.files&&inp.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{let obj;try{obj=JSON.parse(r.result);}catch(e){toast('Arquivo inválido (não é JSON).','err');return;}
      const nd=(obj&&obj.data&&typeof obj.data==='object')?obj.data:obj;
      if(!nd||(!nd.notebooks&&!nd.teses&&!nd.sumulas&&!nd.provas)){toast('Não parece um backup do Codex Magistratura.','err');return;}
      const c=`${(nd.notebooks||[]).length} caderno(s) · ${(nd.teses||[]).length} tese(s) · ${(nd.sumulas||[]).length} súmula(s) · ${(nd.provas||[]).length} concurso(s)`;
      confirmModal('Importar backup','Isto vai <b>substituir</b> o conteúdo atual por:<br>'+c+'.<br><br>Dica: baixe um backup do estado atual antes, por garantia. Continuar?',()=>{
        applyBackup(nd,obj);closeModal();toast('Backup importado com sucesso.','ok');go('home');
      });
    };r.readAsText(f);};
  inp.click();
}
function applyBackup(nd,obj){
  data=normalizeData(nd); data.updatedAt=Date.now();
  if(obj&&obj.theme)settings.theme=obj.theme;
  if(obj&&obj.geminiModel)settings.geminiModel=obj.geminiModel;
  saveSettings();
  try{localStorage.setItem('mag_data',JSON.stringify(data));}catch(e){}
  if(drive.connected)drive.save();
  applyTheme(settings.theme||'pergaminho');
  applyViewPrefs();
  cur={nbId:null,nodeId:null,tab:'editor',matFilter:'all'};
}

      <div class="vp-row"><span>Tamanho do texto dos Subcadernos</span><input type="range" min="12" max="24" value="${vp.treeFont}" oninput="setViewPref('treeFont',this.value)"><b id="vp_treeFont_o">${vp.treeFont}px</b></div>
      <div class="vp-row"><span>Zoom do editor de texto</span><input type="range" min="60" max="170" step="5" value="${vp.edZoom}" oninput="setViewPref('edZoom',this.value)"><b id="vp_edZoom_o">${vp.edZoom}%</b></div>
      <div class="vp-row"><span>Altura da janela do editor</span><input type="range" min="40" max="96" step="2" value="${vp.edH}" oninput="setViewPref('edH',this.value)"><b id="vp_edH_o">${vp.edH}vh</b></div>
      <div class="row" style="margin-top:6px"><button class="btn ghost sm" onclick="resetViewPrefs()">↺ Restaurar padrão</button>
        <button class="btn ghost sm" onclick="closeModal();go('cadernos')">👁 Ver nos Cadernos</button></div>
      <div class="hintbox" style="margin-top:6px">Dica: você também pode <b>arrastar a divisória</b> (barra dourada) entre os quadros direto na tela dos Cadernos. Tudo fica salvo e vai para o <b>Google Drive</b> — abre <b>igual em qualquer computador</b>.</div>
    </div>
    <div class="field"><label>Estrutura / modelos de cadernos</label>
      <div class="row"><button class="btn gold" onclick="closeModal();buildEditalStructure()">📋 Estrutura dos editais (TJSC + TRF6)</button>
        <button class="btn ghost" onclick="closeModal();seedAreas();go('cadernos')">Áreas padrão (vazias)</button></div></div>
    <div class="field"><label>Backup — não perca nada</label>
      <div class="row"><button class="btn gold" onclick="exportBackup()">⬇️ Baixar tudo (backup)</button>
        <button class="btn ghost" onclick="importBackup()">⬆️ Importar backup</button></div>
      <label style="font-size:12.5px;display:flex;gap:7px;align-items:center;margin-top:8px"><input type="checkbox" id="cfgAutosave" ${settings.autosave!==false?'checked':''} onchange="settings.autosave=this.checked;saveSettings();toast(this.checked?'Salvamento automático ligado.':'Salvamento automático desligado.','ok')"> 💾 Salvar e sincronizar tudo automaticamente (recomendado)</label>
      <div class="hintbox" style="margin-top:8px">Para migrar para uma versão mais nova do app sem perder nada: clique em <b>Baixar tudo</b> aqui, abra a versão nova e use <b>Importar backup</b>. Com o Drive conectado, isso já acontece sozinho.</div></div>
    <div class="field"><label>Dados (manutenção)</label>
      <button class="btn gold" style="width:100%;margin-bottom:6px" onclick="mergeDuplicates()">🧹 Mesclar cadernos/subpastas duplicados</button>
      <div class="row"><button class="btn burg" onclick="clearTeses()">🗑 Limpar Teses</button>
        <button class="btn burg" onclick="clearSumulas()">🗑 Limpar Súmulas</button></div></div>
    <details class="setup-guide" style="margin-top:8px">
      <summary>📘 Guia rápido de configuração (links diretos)</summary>
      <div class="hintbox" style="margin-top:10px">
        <b>Passo a passo (mesmo projeto no Google Cloud):</b>
        <ol style="margin:8px 0 0;padding-left:20px;line-height:1.7">
          <li>Ative as APIs:
            <a href="https://console.cloud.google.com/apis/library/drive.googleapis.com" target="_blank" rel="noopener">Google Drive API</a> ·
            <a href="https://console.cloud.google.com/apis/library/picker.googleapis.com" target="_blank" rel="noopener">Google Picker API</a> ·
            <a href="https://console.cloud.google.com/apis/library/generativelanguage.googleapis.com" target="_blank" rel="noopener">Generative Language API (Gemini)</a>.</li>
          <li>Configure a <a href="https://console.cloud.google.com/apis/credentials/consent" target="_blank" rel="noopener">tela de consentimento OAuth</a> e adicione seu e-mail em <i>usuários de teste</i>.</li>
          <li>Em <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener">Credenciais</a>, crie um <b>ID do cliente OAuth</b> (tipo “Aplicativo da Web”) e adicione em <i>Origens JavaScript autorizadas</i>: <code>${esc(origin)}</code></li>
          <li>Ainda em Credenciais, crie uma <b>Chave de API</b> (para o Picker) — e/ou pegue a key do Gemini no <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a>.</li>
          <li>Cole o <b>Client ID</b> e a <b>API key</b> nos campos acima e clique em “Salvar e conectar ao Drive”.</li>
        </ol>
      </div>
    </details>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Fechar</button>
      <button class="btn gold" onclick="saveCfg()">Salvar</button></div>`);
}
function readCfg(){settings.clientId=$('#cfgClient').value.trim();settings.geminiApiKey=$('#cfgGemini').value.trim();settings.pickerApiKey=($('#cfgPicker')?$('#cfgPicker').value.trim():settings.pickerApiKey)||'';settings.geminiModel=$('#cfgModel').value;saveSettings();}
function saveCfg(){readCfg();drive.client=null;initGoogleClient();toast('Configurações salvas.','ok');closeModal();if(cur.screen==='home')go('home');}
function saveSettingsAndConnect(){readCfg();drive.client=null;if(initGoogleClient()){driveLogin();}else{toast('Não foi possível iniciar o Google. Verifique o Client ID e a conexão.','err');}}

/* ============================================================
   INÍCIO
   ============================================================ */
window.addEventListener('load',()=>{setTimeout(()=>{if(settings.clientId)initGoogleClient();},800);});
stripEditalTags();
applyTheme(settings.theme||'pergaminho');
applyViewPrefs();
go('home');
</script>
</body>
</html>
