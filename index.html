ria, econômica e relações de consumo (Leis nº 8.1…", "c": "Dos crimes contra a ordem tributária, econômica e relações de consumo (Leis nº 8.137/1990 e suas alterações e nº 8.176/1991);"}, {"o": "TJSC", "n": "69", "t": "Dos crimes previstos no Código de Defesa do Consumidor (Lei nº 8.078/1990 e suas a…", "c": "Dos crimes previstos no Código de Defesa do Consumidor (Lei nº 8.078/1990 e suas alterações);"}, {"o": "TJSC", "n": "70", "t": "Dos crimes de lavagem de capitais (Lei nº 9.613/1998 e suas alterações);", "c": "Dos crimes de lavagem de capitais (Lei nº 9.613/1998 e suas alterações);"}, {"o": "TJSC", "n": "71", "t": "Das disposições penais em relação à prevenção e repressão de organizações criminos…", "c": "Das disposições penais em relação à prevenção e repressão de organizações criminosas (Lei nº 12.850/2013 e suas alterações);"}, {"o": "TJSC", "n": "72", "t": "Dos crimes de Licitações Públicas (Lei nº 14.133/2021);", "c": "Dos crimes de Licitações Públicas (Lei nº 14.133/2021);"}, {"o": "TJSC", "n": "73", "t": "Dos crimes de responsabilidade penal dos Prefeitos e Vereadores (Decreto-Lei nº 20…", "c": "Dos crimes de responsabilidade penal dos Prefeitos e Vereadores (Decreto-Lei nº 201/1967 e suas alterações);"}, {"o": "TJSC", "n": "74", "t": "Crimes falimentares (Lei nº 11.101/2005 e suas alterações);", "c": "Crimes falimentares (Lei nº 11.101/2005 e suas alterações);"}, {"o": "TJSC", "n": "75", "t": "Crimes de propriedade intelectual (Lei nº 9.279/1996 e suas alterações);", "c": "Crimes de propriedade intelectual (Lei nº 9.279/1996 e suas alterações);"}, {"o": "TJSC", "n": "76", "t": "Dos Crimes previstos na Lei Geral do Esporte (Lei nº 14.597/2023);", "c": "Dos Crimes previstos na Lei Geral do Esporte (Lei nº 14.597/2023);"}, {"o": "TJSC", "n": "77", "t": "Lei de Abuso de Autoridade (Lei nº 13.869/2019)", "c": "Lei de Abuso de Autoridade (Lei nº 13.869/2019)."}, {"o": "TJSC", "n": "78", "t": "Lei das Contravenções Penais (Decreto-Lei nº 3.688/1941 e suas alterações);", "c": "Lei das Contravenções Penais (Decreto-Lei nº 3.688/1941 e suas alterações);"}, {"o": "TJSC", "n": "79", "t": "Lei de Prevenção e Enfrentamento da violência doméstica e familiar contra a crianç…", "c": "Lei de Prevenção e Enfrentamento da violência doméstica e familiar contra a criança e o adolescente (Lei nº 14.344/2022)."}, {"o": "TJSC", "n": "80", "t": "Direito Penal Militar:", "c": "Direito Penal Militar: Conceito. Autonomia. Classificação doutrinária. Aplicação da Lei Penal Militar. Imputabilidade Penal. Concurso de Agentes. Aplicação da pena. Penas principais e acessórias. Suspensão condicional da pena. Livramento condicional. Penas acessórias. Efeitos da condenação. Medidas de Segurança. Ação Penal. Extinção da Punibilidade. Crimes contra a Autoridade ou Disciplina Militar. Crimes contra a Administração Militar. Crimes contra a Justiça Militar. Genocídio. Dos Crimes Militares em Tempo de Paz: Crimes contra a segurança externa do país. Crimes contra a autoridade ou disciplina militar. Crimes contra o serviço militar e o dever militar. Crimes contra a pessoa. Crimes contra o patrimônio. Crimes contra a incolumidade pública. Crimes contra a administração militar. Crimes contra a administração da justiça militar. Dos Crimes Militares em Tempo de Guerra: Do favorecimento ao inimigo. Da hostilidade e da ordem arbitrária. Crimes contra a pessoa. Crimes contra o patrimônio. Do rapto e da violência carnal."}, {"o": "TRF6", "n": "1", "t": "Introdução ao Direito Penal", "c": "Introdução ao Direito Penal. Conceito, caracteres e função do Direito Penal. Princípios básicos do Direito Penal. Princípios de normas penais contidas na Constituição Federal de 1988. Relações com outros ramos do Direito. Direito Penal e política criminal. Criminologia: noções gerais. Norma Penal. Conflito aparente de normas. Teoria Geral do Delito."}, {"o": "TRF6", "n": "2", "t": "Da aplicação da lei penal:", "c": "Da aplicação da lei penal: princípio da anterioridade; lei penal no tempo; lei excepcional ou temporária; tempo do crime; territorialidade; lugar do crime; extraterritorialidade; pena cumprida no estrangeiro; eficácia de sentença estrangeira; contagem de prazo; frações não computáveis na pena; aplicação da parte geral do Código Penal aos fatos incriminados por lei especial."}, {"o": "TRF6", "n": "3", "t": "Do crime:", "c": "Do crime: relação de causalidade; superveniência de causa independente; relevância da omissão; crime consumado; tentativa; desistência voluntária e arrependimento eficaz; arrependimento posterior; crime impossível; crime doloso; crime culposo; agravação pelo resultado; erro sobre elementos do tipo; descriminantes putativas; erro sobre a ilicitude do fato; coação irresistível e obediência hierárquica; exclusão da ilicitude; excesso punível; estado de necessidade; legítima defesa; estrito cumprimento de dever legal e exercício regular de direito."}, {"o": "TRF6", "n": "4", "t": "Da imputabilidade penal:", "c": "Da imputabilidade penal: agentes inimputáveis; menoridade penal; emoção e paixão; embriaguez."}, {"o": "TRF6", "n": "5", "t": "Do concurso de pessoas:", "c": "Do concurso de pessoas: regras comuns às penas privativas da liberdade; circunstâncias incomunicáveis; casos de impunibilidade."}, {"o": "TRF6", "n": "6", "t": "Das penas:", "c": "Das penas: das espécies de penas; das penas privativas da liberdade: reclusão e detenção; regras do regime fechado; regras do regime semiaberto; regras do regime aberto; regime especial; direitos do preso; legislação especial relativa aos direitos e ao trabalho do preso e a outras questões relativas à execução penal; superveniência de doença mental; detração penal; das penas restritivas de direitos: normas gerais sobre as penas restritivas de direitos; conversão das penas restritivas de direitos; prestação de serviços à comunidade ou a entidades públicas; interdição temporária de direitos; da pena de multa: normas gerais sobre a pena de multa; pagamento da multa; suspensão da execução da multa; da cominação das penas; penas privativas da liberdade; penas restritivas de direitos; pena de multa; da aplicação da pena: fixação da pena; critérios especiais da pena de multa; multa substitutiva; circunstâncias agravantes; agravantes no concurso de pessoas; reincidência; circunstâncias atenuantes; concurso de circunstâncias agravantes e atenuantes; cálculo da pena; concurso material; concurso formal; crime continuado; multas no concurso de crimes; erro na execução do crime; resultado diverso do pretendido; limite das penas; ordem de execução das penas no concurso de infrações; da suspensão condicional da pena: requisitos da suspensão da pena; revogação obrigatória e facultativa da suspensão da pena; prorrogação do período de prova; efeito do cumprimento das condições da suspensão condicional da pena; do livramento condicional: requisitos do livramento condicional; soma de penas relativas a infrações diversas, para fim do livramento condicional; condições a que fica subordinado o livramento condicional; revogação obrigatória e facultativa do livramento condicional; efeitos da revogação; a declaração de extinção da pena e o crime cometido na vigência do livramento condicional; dos efeitos genéricos e específicos da condenação; da reabilitação."}, {"o": "TRF6", "n": "7", "t": "Das medidas de segurança:", "c": "Das medidas de segurança: espécies; da imposição de medida de segurança para o inimputável; prazos de duração das medidas de segurança; da perícia médica; da desinternação ou liberação condicional; da substituição da pena por medida de segurança para o semi-imputável; dos direitos do internado."}, {"o": "TRF6", "n": "8", "t": "Da ação penal:", "c": "Da ação penal: ação penal pública e de iniciativa privada; da ação penal no crime complexo; da irretratabilidade da representação; da decadência do direito de queixa ou representação; da renúncia expressa ou tácita ao direito de queixa; do perdão do ofendido; da extinção da punibilidade: hipóteses de extinção da punibilidade; da prescrição antes de transitar em julgado a sentença; da prescrição das penas restritivas de direitos; da prescrição depois de transitar em julgado a sentença final condenatória; do termo inicial de prescrição antes de transitar em julgado a sentença final; do termo final da prescrição após a sentença condenatória irrecorrível; da prescrição no caso de evasão do condenado ou de revogação do livramento condicional; da prescrição da multa; da redução dos prazos de prescrição; das causas impeditivas da prescrição; das causas interruptivas da prescrição; da reabilitação penal; do perdão judicial."}, {"o": "TRF6", "n": "9", "t": "Dos crimes previstos na parte especial do Código Penal:", "c": "Dos crimes previstos na parte especial do Código Penal: dos crimes contra a pessoa; dos crimes contra o patrimônio; dos crimes contra a propriedade imaterial; dos crimes contra a organização do trabalho; dos crimes contra a dignidade sexual; dos crimes contra a incolumidade pública; dos crimes contra a paz pública; dos crimes contra a fé pública; dos crimes contra a administração pública."}, {"o": "TRF6", "n": "10", "t": "Leis Penais especiais", "c": "Leis Penais especiais. Aspectos penais previstos na legislação extravagante."}, {"o": "TRF6", "n": "11", "t": "Tratados e Convenções em matéria criminal", "c": "Tratados e Convenções em matéria criminal. A Convenção das Nações Unidas contra o Crime Organizado Transnacional. A Convenção das Nações Unidas contra a Corrupção. A Convenção contra o Tráfico Ilícito de Entorpecentes e Substâncias Psicotrópicas."}, {"o": "TRF6", "n": "12", "t": "A responsabilidade penal da pessoa jurídica no direito brasileiro", "c": "A responsabilidade penal da pessoa jurídica no direito brasileiro. Crimes de menor potencial ofensivo."}]}, {"nome": "Direito Processual Penal", "itens": [{"o": "TJSC", "n": "1", "t": "Interpretação e aplicação da norma processual penal", "c": "Interpretação e aplicação da norma processual penal."}, {"o": "TJSC", "n": "2", "t": "Direito Processual Penal à luz da Constituição Federal", "c": "Direito Processual Penal à luz da Constituição Federal."}, {"o": "TJSC", "n": "3", "t": "Do inquérito Policial (Título II do Livro I – CPP)", "c": "Do inquérito Policial (Título II do Livro I – CPP)."}, {"o": "TJSC", "n": "4", "t": "Da Ação Penal (Título III do Livro I – CPP)", "c": "Da Ação Penal (Título III do Livro I – CPP)."}, {"o": "TJSC", "n": "5", "t": "Da Ação Civil (Título IV do Livro I – CPP)", "c": "Da Ação Civil (Título IV do Livro I – CPP)."}, {"o": "TJSC", "n": "6", "t": "Da Competência (Título V do Livro I – CPP)", "c": "Da Competência (Título V do Livro I – CPP)."}, {"o": "TJSC", "n": "7", "t": "Das Questões e Processos Incidentes (Título VI do Livro I – CPP)", "c": "Das Questões e Processos Incidentes (Título VI do Livro I – CPP)."}, {"o": "TJSC", "n": "8", "t": "Da prova (Título VII do Livro I – CPP)", "c": "Da prova (Título VII do Livro I – CPP)."}, {"o": "TJSC", "n": "9", "t": "Do Juiz, do Ministério Público, do Acusado e Defensor, dos Assistentes e Auxiliare…", "c": "Do Juiz, do Ministério Público, do Acusado e Defensor, dos Assistentes e Auxiliares da Justiça (Título VIII do Livro I – CPP)."}, {"o": "TJSC", "n": "10", "t": "Da Prisão, das Medidas Cautelares e da Liberdade Provisória (Título IX do Livro I…", "c": "Da Prisão, das Medidas Cautelares e da Liberdade Provisória (Título IX do Livro I – CPP)."}, {"o": "TJSC", "n": "11", "t": "Das Citações e Intimações (Título X do Livro I – CPP)", "c": "Das Citações e Intimações (Título X do Livro I – CPP)."}, {"o": "TJSC", "n": "12", "t": "Da Sentença (Título XII do Livro I – CPP)", "c": "Da Sentença (Título XII do Livro I – CPP)."}, {"o": "TJSC", "n": "13", "t": "Do Processo Comum (Título I do Livro II – CPP)", "c": "Do Processo Comum (Título I do Livro II – CPP)."}, {"o": "TJSC", "n": "14", "t": "Dos Processos Especiais (Título II do Livro II – CPP)", "c": "Dos Processos Especiais (Título II do Livro II – CPP)."}, {"o": "TJSC", "n": "15", "t": "Das Nulidades e dos Recursos em Geral (Títulos I e II do Livro III – CPP)", "c": "Das Nulidades e dos Recursos em Geral (Títulos I e II do Livro III – CPP)."}, {"o": "TJSC", "n": "16", "t": "Reforma do Processo Penal (Pacote Anticrime - Lei nº 13.964/2019)", "c": "Reforma do Processo Penal (Pacote Anticrime - Lei nº 13.964/2019)."}, {"o": "TJSC", "n": "17", "t": "Da Execução da Pena (Lei nº 7210/84)", "c": "Da Execução da Pena (Lei nº 7210/84)."}, {"o": "TJSC", "n": "18", "t": "Leis especiais:", "c": "Leis especiais: a) Lei antidrogas (Lei nº 11.343/2006 e suas alterações); b) Programa de proteção às vítimas (Lei nº 9.807/1999); c) Lei de abuso de autoridade (Lei nº 13.869/2019); d) Interceptação telefônica (Lei nº 9.296/1996); e) Lei dos crimes hediondos (Lei nº 8.072/1990 e suas alterações); f) Lei dos Juizados Especiais (Lei nº 9.099/1995 e suas alterações); g) Prisão temporária (Lei nº 7.960/1989 e suas alterações); h) Lei das organizações criminosas (Lei nº 12.850/2013 e suas alterações); i) Código de Trânsito Brasileiro (Lei nº 9.503/1997 e suas alterações); j) Estatuto do desarmamento (Lei nº 10.826/2003 e suas alterações); k) Violência doméstica (Lei nº 11.340/2006 e suas alterações); l) Decreto-Lei nº 201/1967 e suas alterações; m) Lei de Prevenção e Enfrentamento da violência doméstica e familiar contra a criança e o adolescente (Lei nº 14.344/2022); n) CIRCULAR N. 277 DE 03 DE OUTUBRO DE 2023 – CORREGEDORIA-GERAL DA JUSTIÇA; o) Decreto-Lei nº 3.240/1941; p) Resolução nº 213/2015 do Conselho Nacional de Justiça; q) Resolução nº 427/2021 do Conselho Nacional de Justiça; r) Resolução nº 484/2022 do Conselho Nacional de Justiça."}, {"o": "TRF6", "n": "1", "t": "Conceito", "c": "Conceito. Finalidade. Caracteres. Princípios gerais. Fontes. Repartição constitucional de competência. Garantias constitucionais do processo. Aplicação da lei processual penal. Normas das convenções e dos tratados de Direito Internacional relativos ao Processo Penal e aos tratados bilaterais de auxílio direto. Convenção da ONU contra a corrupção. Cooperação Internacional – tratados bilaterais e multilaterais celebrados pelo Brasil em matéria penal."}, {"o": "TRF6", "n": "2", "t": "Persecução penal", "c": "Persecução penal. Inquérito Policial. Procedimento. Garantias do investigado. Atribuições da autoridade policial. Intervenção do Ministério Público no inquérito policial. A investigação criminal promovida pelo próprio Ministério Público. Outros meios de colheita de indícios da infração. Comissão Parlamentar de Inquérito. Arquivamento do inquérito. Denúncia."}, {"o": "TRF6", "n": "3", "t": "Sujeitos do processo", "c": "Sujeitos do processo. Juiz. Ministério Público. Acusado e seu defensor. Assistente. Curador do réu menor. Auxiliares da justiça. Assistentes. Peritos e intérpretes. Serventuários da justiça. Impedimentos e suspeições."}, {"o": "TRF6", "n": "4", "t": "Atos processuais", "c": "Atos processuais. Comunicações. Citações e intimações. Revelia. Despachos. Decisões interlocutórias. Audiência de Instrução. Sentença: tipos, estrutura, efeitos. Fixação da pena. Normas sobre a informatização do processo judicial."}, {"o": "TRF6", "n": "5", "t": "Jurisdição", "c": "Jurisdição. Competência: pelo lugar da infração, pelo domicílio ou residência do réu, pela natureza da infração, por distribuição, por conexão, por continência, por prevenção e por prerrogativa de função. Outras disposições especiais sobre competência, nos crimes cometidos fora do território brasileiro, nos crimes cometidos a bordo de embarcações marítimas, lacustres ou pluviais, ou a bordo de navios ou aeronaves. Competência da Justiça Federal, dos Tribunais Regionais Federais, do STJ e do STF. Perpetuatio jurisdictionis. Conflito de competência. Julgamento por colegiado de juízes de 1º grau de jurisdição em crimes praticados por organização criminosa."}, {"o": "TRF6", "n": "6", "t": "Questões e processos incidentes", "c": "Questões e processos incidentes. Questões prejudiciais. Exceções. Incompatibilidades e Impedimentos. Medidas assecuratórias: sequestro, hipoteca legal e arresto. Incidentes de falsidade e de insanidade mental do acusado. Restituição das coisas apreendidas. Perdimento de bens. Alienação antecipada de bens."}, {"o": "TRF6", "n": "7", "t": "Provas", "c": "Provas. Teoria Geral da Prova. Procedimento probatório. Sistemas probatórios. Classificação. Provas em espécie. Exame do corpo de delito e perícias em geral. Prova oral: prova testemunhal, depoimento do ofendido, interrogatório do acusado. Confissão. Reconhecimento de pessoas e coisas. Acareação. Prova documental. Presunções. Indícios. Busca e apreensão. Ônus da prova. Valoração da prova. Interceptação de comunicações telefônicas e do fluxo de comunicações em sistemas de informática e telemática. Quebra de sigilo fiscal, bancário e de dados. Provas ilícitas. Meios de obtenção de prova previstos na Lei que define organização criminosa. A delação ou colaboração premiada. Normas sobre a identificação criminal do civilmente identificado. Coleta de perfil genético como forma de identificação criminal. Normas do Programa Federal de Assistência a Vítimas e Testemunhas Ameaçadas, e de proteção de acusados ou condenados que voluntariamente tenham prestado efetiva colaboração à investigação policial e ao processo criminal. Normas procedimentais para a ação penal de competência originária dos Tribunais."}, {"o": "TRF6", "n": "8", "t": "Prisão em flagrante", "c": "Prisão em flagrante. Prisão temporária. Prisão preventiva. A manutenção ou a imposição da prisão preventiva na sentença de pronúncia e na sentença penal condenatória. Medidas cautelares diversas da prisão. Princípio da necessidade. Princípio da adequação. Prisão especial, prisão albergue, prisão domiciliar e liberdade provisória. Fiança. Audiência de Custódia."}, {"o": "TRF6", "n": "9", "t": "Ação Penal", "c": "Ação Penal. Processo: finalidade, pressupostos e sistemas. Procedimento Comum Ordinário. Procedimento Comum Sumário. Procedimentos Especiais: do Tribunal do Júri, nos crimes de abuso de autoridade, nos crimes de responsabilidade dos funcionários públicos, nos crimes contra a honra e nos crimes contra a propriedade imaterial. A restauração de autos extraviados ou destruídos. Normas especiais previstas na Lei que dispõe sobre o processo e o julgamento colegiado em primeiro grau de crimes praticados por organizações criminosas. Normas especiais previstas na Lei que dispõe sobre a repressão à produção não autorizada e ao tráfico ilícito de drogas. Disposições especiais e medidas assecuratórias previstas na Lei que dispõe sobre os crimes de “lavagem” ou ocultação de bens, direitos e valores. Disposições especiais previstas na Lei que dispõe sobre os crimes ambientais. Disposições especiais previstas na Lei que dispõe sobre as licitações e os contratos administrativos. Disposições especiais previstas na Lei que dispõe sobre os crimes contra o sistema financeiro nacional. Normas especiais previstas na Lei que define a situação jurídica do estrangeiro no Brasil."}, {"o": "TRF6", "n": "10", "t": "Relações jurisdicionais com autoridade estrangeira", "c": "Relações jurisdicionais com autoridade estrangeira. Cartas rogatórias. Homologação de sentença estrangeira. Extradição. Expulsão. Deportação."}, {"o": "TRF6", "n": "11", "t": "Nulidades", "c": "Nulidades. Espécies. Princípios. Rol legal."}, {"o": "TRF6", "n": "12", "t": "Recursos", "c": "Recursos. Teoria Geral dos Recursos. Embargos de declaração. Apelação. Recurso em sentido estrito. Protesto por novo júri. Embargos infringentes e de nulidade. Carta testemunhável. Correição Parcial. Recursos especial e extraordinário. Agravo em execução penal. Coisa julgada. Revisão criminal. Habeas corpus. Mandado de segurança em matéria penal. Medida cautelar em matéria penal."}, {"o": "TRF6", "n": "13", "t": "Juizados Especiais Federais Criminais:", "c": "Juizados Especiais Federais Criminais: normas constitucionais e legais. Procedimento Especial nos Juizados. Termo Circunstanciado. Transação Penal. Suspensão Condicional do Processo. Sistema Recursal."}, {"o": "TRF6", "n": "14", "t": "Execução Penal", "c": "Execução Penal. Competência. Execução das penas privativas de liberdade, das penas restritivas de direito e das medidas de segurança. Regimes de cumprimento da pena. Progressão e regressão. Das faltas disciplinares, Suspensão condicional da pena. Livramento condicional. Incidentes da execução. Graça. Anistia. Indulto. Comutação da pena. Reabilitação. Remição. Regime Disciplinar Diferenciado. Execução das penas pecuniárias. Modificações das condições da execução, coisa julgada e aplicação da lei benéfica. Inclusão e transferência de presos para presídios federais. Monitoramento eletrônico. Execução penal no âmbito dos Juizados Especiais Federais."}, {"o": "TRF6", "n": "15", "t": "Legislação processual penal extravagante", "c": "Legislação processual penal extravagante."}]}, {"nome": "Direito Empresarial", "itens": [{"o": "TJSC", "n": "1", "t": "Empresa e empresário", "c": "Empresa e empresário. Estabelecimento empresarial."}, {"o": "TJSC", "n": "2", "t": "Microempresa, microempreendedor individual e empresa de pequeno porte (Lei Complem…", "c": "Microempresa, microempreendedor individual e empresa de pequeno porte (Lei Complementar nº 123/2006 e suas alterações)."}, {"o": "TJSC", "n": "3", "t": "Propriedade Industrial", "c": "Propriedade Industrial. 3.1 Patentes: a) pedido; b) concessão da patente; c) invenção; d) modelo de utilidade; e) proteção; f) nulidades; g) cessão do pedido ou da patente; h) extinção da patente. 3.2 Marcas: a) caracterização; b) registro; c) restrições; d) proteção; e) nulidades; f) cessão e licença de uso; g) prazo; h) extinção do registro. 3.3 Desenhos Industriais: a) titularidade e pedido de registro; b) proteção legal; c) nulidade e extinção do registro. 3.4 Concorrência desleal. Aspectos civis."}, {"o": "TJSC", "n": "4", "t": "Direito Societário", "c": "Direito Societário. Código Civil de 2002. 4.1 Sociedade empresária: a) conceito de sociedade; b) formação e divisão do capital; c) responsabilidade dos sócios; d) personalidade jurídica; e) desconsideração da personalidade jurídica; f) classificação das sociedades; g) constituição das sociedades. 4.2 Das sociedades em espécie: a) sociedade em comum; b) sociedade em conta de participação; c) sociedade simples; d) sociedade em nome coletivo; e) sociedade em comandita simples; f) sociedade limitada; g) sociedade anônima; h) sociedade em comandita por ações; i) sociedade cooperativa."}, {"o": "TJSC", "n": "5", "t": "Ligações Societárias:", "c": "Ligações Societárias: a) sociedade controladora; b) sociedades coligadas; c) subsidiária integral; d) grupo societário; e) consórcio."}, {"o": "TJSC", "n": "6", "t": "Títulos de crédito", "c": "Títulos de crédito. 6.1 Código Civil de 2002 e Lei Uniforme (Decreto nº 57.663/1966): a) características de títulos de crédito; b) circulação dos títulos de crédito; c) conceito de título de crédito; d) requisitos essenciais e não essenciais; e) títulos escriturais. 6.2 Classificação dos títulos de crédito quanto à circulação: a) títulos de crédito não à ordem; b) títulos de crédito ao portador; títulos de crédito à ordem. 6.3 Institutos cambiários: a) saque; b) endosso; c) aceite; d) intervenção; e) aval; f) protesto (Lei nº 9.492/1997). 6.4 Títulos de crédito em espécie: a) letra de câmbio; b) nota promissória; c) duplicata; d) cheque; e) cédula de produto rural; f) comercial paper; g) cédulas de crédito comercial, industrial, rural e bancário; h) debêntures; i) títulos de crédito do agronegócio (Lei nº 11.076/2004 e suas alterações)."}, {"o": "TJSC", "n": "7", "t": "Recuperação judicial, extrajudicial falência do empresário e da sociedade empresár…", "c": "Recuperação judicial, extrajudicial falência do empresário e da sociedade empresária (Lei nº 11.101/2005 e suas alterações). 7.1 Crise econômica e financeira e cessação do pagamento; causas macro e microeconômicas da crise da empresa. 7.2 Disposições preliminares e comuns à recuperação judicial e à falência: a) verificação e da habilitação de créditos; b) administrador judicial e comitê de credores; c) assembleia geral de credores. 7.3 Recuperação judicial: a) objetivo; b) legitimidade ativa; c) requisitos; d) créditos abrangidos e exceções; e) meios para a obtenção da recuperação da empresa; f) pedido e processamento da recuperação judicial; g) plano de recuperação judicial; h) consolidação processual e patrimonial/substancial; i) plano alternativo; j) concessão da recuperação e seus efeitos; k) encerramento da recuperação. 7.4 Recuperação judicial das Microempresas e Empresas de Pequeno Porte: plano especial. Conteúdo e aprovação. 7.5 Recuperação extrajudicial. 7.6 Convolação da recuperação judicial em falência. 7.7 Falência: a) objetivo; b) juízo universal; c) habilitação e verificação dos créditos; d) classificação dos créditos e ordem de preferência; e) incidente de classificação de créditos de direito público. 7.8 Procedimento pré-falimentar e decretação da falência; a) direitos e deveres do falido; b) autofalência; c) efeitos da decretação da falência sobre as obrigações do devedor; suas obrigações, bens, contratos e atos praticados antes da falência; d) ações falimentares. 7.9 Crimes em espécie na falência, na recuperação judicial e na recuperação extrajudicial: a) competência; b) natureza da ação penal; c) procedimento penal; d) prescrição; e) efeitos da sentença condenatória; f) legitimação passiva; g) condição objetiva de punibilidade."}, {"o": "TRF6", "n": "1", "t": "Direito Comercial:", "c": "Direito Comercial: origem. Evolução histórica. Autonomia. Fontes. Características. Empresário: caracterização. Inscrição. Capacidade. Microempresa e empresa de pequeno porte (Lei Complementar nº 123/2006 e suas alterações). Teoria da empresa e seus perfis."}, {"o": "TRF6", "n": "2", "t": "Teoria geral dos títulos de crédito", "c": "Teoria geral dos títulos de crédito. Títulos de crédito escriturais. Atos cambiários: saque, aceite, endosso, aval. Títulos de crédito em espécie: letra de câmbio, cheque, nota promissória, duplicata, títulos de crédito do agronegócio. Títulos de crédito de financiamento (rural, industrial, comercial, exportação). Cédula de crédito bancário. Ações cambiais, protesto cambial e prescrição da ação cambial. Ação de locupletamento e ação causal."}, {"o": "TRF6", "n": "3", "t": "Teoria geral do direito societário", "c": "Teoria geral do direito societário. Conceito de sociedade e elementos essenciais. Sociedade unipessoal. Classificação das sociedades Personificação da sociedade. Sociedades não personificadas: sociedade em comum e sociedade em conta de participação. Sociedade de propósito específico."}, {"o": "TRF6", "n": "4", "t": "Sociedades personificadas:", "c": "Sociedades personificadas: sociedade simples, sociedade em nome coletivo, sociedade em comandita simples, sociedade em comandita por ações, sociedade cooperativa, sociedade limitada e sociedade anônima. Sociedades coligadas e controladas. Grupos econômicos de fato e de direito. Dissolução, liquidação e extinção das sociedades. Transformação. Incorporação, Fusão e Cisão de sociedades. Sociedades dependentes de autorização."}, {"o": "TRF6", "n": "5", "t": "Mercado de valores mobiliários", "c": "Mercado de valores mobiliários. Comissão de Valores Mobiliários."}, {"o": "TRF6", "n": "6", "t": "Estabelecimento Empresarial", "c": "Estabelecimento Empresarial. Institutos Complementares do Direito Empresarial: Registro Empresarial. Nome Empresarial. Prepostos. Escrituração."}, {"o": "TRF6", "n": "7", "t": "Contratos empresariais:", "c": "Contratos empresariais: Comissão. Transporte de pessoas e coisas. Transporte aéreo e transporte multimodal. Representação comercial. Concessão comercial. Franquia empresarial. Distribuição. Alienação fiduciária em garantia. Faturização (Factoring). Arrendamento mercantil (Leasing). Cartão de crédito."}, {"o": "TRF6", "n": "8", "t": "Contratos bancários:", "c": "Contratos bancários: Depósito bancário. Conta-corrente. Aplicação financeira. Mútuo bancário. Desconto. Abertura de crédito. Crédito documentário."}, {"o": "TRF6", "n": "9", "t": "Sistema Financeiro Nacional:", "c": "Sistema Financeiro Nacional: Constituição. Competência de suas entidades integrantes. Instituições financeiras públicas e privadas. Intervenção e Liquidação extrajudicial de instituições financeiras. Sistema Financeiro da Habitação."}, {"o": "TRF6", "n": "10", "t": "Recuperação judicial, recuperação extrajudicial e a falência do empresário e da so…", "c": "Recuperação judicial, recuperação extrajudicial e a falência do empresário e da sociedade empresária."}, {"o": "TRF6", "n": "11", "t": "Propriedade Industrial", "c": "Propriedade Industrial. Noções Gerais. Regime Jurídico. Invenção. Desenho Industrial. Modelo de Utilidade. Marca. Indicações geográficas. Concorrência desleal."}]}, {"nome": "Direito Financeiro e Tributário", "itens": [{"o": "TJSC", "n": "1", "t": "Sistema Tributário Nacional", "c": "Sistema Tributário Nacional. Princípios gerais. Limitações constitucionais ao poder de tributar. Repartições de competência (impostos da União, Estados, Distrito Federal e Municípios na Constituição Federal de 1988). Repartição constitucional de receitas tributárias."}, {"o": "TJSC", "n": "2", "t": "Tributos", "c": "Tributos. Conceito; definição e características; determinação da natureza jurídica específica do tributo; denominação e destino legal do produto da arrecadação. Tributos diretos e indiretos. Fiscalidade, extrafiscalidade e parafiscalidade."}, {"o": "TJSC", "n": "3", "t": "Espécies tributárias", "c": "Espécies tributárias. Impostos; taxas; contribuição de melhoria; contribuições sociais; preço público; tarifa; pedágio."}, {"o": "TJSC", "n": "4", "t": "Competência tributária", "c": "Competência tributária. Conceito, espécies e características. Competência tributária e c asileiro. Definição de tributo. Espécies de tributos."}, {"o": "TRF6", "n": "7", "t": "Competência tributária plena", "c": "Competência tributária plena. Indelegabilidade da competência. Não-exercício da competência. Competência residual e extraordinária. Limitações da competência. Princípios da legalidade e da tipicidade. Princípio da anualidade. Proibição de tributos interlocais. Imunidade e isenção. Benefícios fiscais. Uniformidade tributária. Tributação das concessionárias. Sociedades mistas e fundações. Imunidade recíproca. Extensão da imunidade às autarquias, empresas públicas e sociedades de economia mista."}, {"o": "TRF6", "n": "8", "t": "Fontes do Direito Tributário", "c": "Fontes do Direito Tributário. Conceito de fonte. Fontes formais do Direito Tributário. Legislação Tributária. Conceito. Lei, Tratados e Convenções Internacionais. Normas Complementares. Leis Complementares. Vigência da Legislação Tributária. Aplicação da Legislação Tributária. Interpretação e integração da Legislação Tributária. Tratados internacionais e legislação interna. A perda de eficácia dos tratados. Os tratados sobre matéria tributária e o art. 98 do CTN. Vigência do tratado."}, {"o": "TRF6", "n": "9", "t": "Elementos do tributo:", "c": "Elementos do tributo: fato gerador, base de cálculo, alíquota e sujeitos."}, {"o": "TRF6", "n": "10", "t": "Taxas e preços públicos", "c": "Taxas e preços públicos. Taxas contratuais e facultativas. Contribuições para a Seguridade Social. Contribuição sobre o lucro. O regime do PIS e da COFINS. A CIDE e o seu regime. Empréstimo compulsório. As limitações constitucionais do empréstimo compulsório na Constituição Federal de 1988."}, {"o": "TRF6", "n": "11", "t": "Impostos federais:", "c": "Impostos federais: impostos sobre o comércio exterior. Imposto sobre produtos industrializados (IPI). Imposto sobre operações de crédito, câmbio e seguro, ou relativas a títulos ou valores mobiliários (IOF). Imposto sobre a propriedade territorial rural (ITR). Si function buildEditalStructure(){
  confirmModal('Estrutura dos editais (TJSC + TRF6)','Vou criar os cadernos por disciplina e uma subpasta para CADA item do conteúdo programático (≈ 446 subpastas), já com o texto oficial do edital no editor. Itens já existentes não são duplicados. Deseja continuar?',()=>{
    let nc=0,ns=0;
    EDITAL_STRUCTURE.forEach(d=>{
      let nb=data.notebooks.find(n=>n.name===d.nome);
      if(!nb){nb=newNotebook(d.nome);data.notebooks.push(nb);nc++;}
      d.itens.forEach(it=>{
        const sep=/^[A-H]$/.test(it.n)?') ':'. ';
        const nome=it.n+sep+it.t;
        if((nb.children||[]).some(c=>c.name===nome))return;
        const node=newNode(nome,1);
        node.content='<p><strong style="color:#7b1e1e">Item '+it.n+'</strong></p><p>'+esc(it.c)+'</p>';
        nb.children.push(node);ns++;
      });
    });
    persist();
    cur.nbId=(data.notebooks[0]&&data.notebooks[0].id)||null;cur.nodeId=null;cur.treeCollapsed=false;
    if(cur.screen!=='cadernos')go('cadernos');else renderCadernos();
    toast(nc+' caderno(s) e '+ns+' subpasta(s) criadas.','ok');
  });
}

function stripEditalTags(){
  let changed=false;
  (data.notebooks||[]).forEach(nb=>walk(nb.children||[],n=>{
    const nn=(n.name||'').replace(/^\s*(TJSC|TRF6)\s*·\s*/i,'');
    if(nn!==n.name){n.name=nn;changed=true;}
    if(n.content){const c=n.content.replace(/(<strong[^>]*>)\s*(TJSC|TRF6)\s*—\s*/i,'$1');if(c!==n.content){n.content=c;changed=true;}}
  }));
  if(changed){try{localStorage.setItem('mag_data',JSON.stringify(data));}catch(e){} if(typeof drive!=='undefined'&&drive.connected)drive.save(); if(cur.screen==='cadernos')renderCadernos();}
  return changed;
}

/* ---------- reordenar (mover ↑/↓) ---------- */
function _swap(a,i,j){const t=a[i];a[i]=a[j];a[j]=t;}
function moveNb(id,dir){ const a=data.notebooks; const i=a.findIndex(n=>n.id===id); if(i<0)return; const j=i+ +dir; if(j<0||j>=a.length)return; _swap(a,i,j); persist(); renderNbList(); }
function _findSiblings(arr,id){ const i=arr.findIndex(n=>n.id===id); if(i>=0)return {arr,i}; for(const n of arr){ if(n.children&&n.children.length){ const r=_findSiblings(n.children,id); if(r)return r; } } return null; }
function moveNode(nbId,id,dir){ const nb=findNb(nbId)||data.notebooks.find(x=>x.id===nbId); const base=nb?(nb.children||[]):[]; const r=_findSiblings(base,id); if(!r)return; const j=r.i+ +dir; if(j<0||j>=r.arr.length)return; _swap(r.arr,r.i,j); persist(); renderTree(); }
/* divisória arrastável: redimensiona o quadro direto na janela e salva (sincroniza no Drive) */
function addResizer(el,key,min,max){
  if(!el||el.classList.contains('rail'))return;
  if(el.querySelector(':scope > .col-resizer'))return;
  const cssVar = key==='nbColW' ? '--nb-col' : '--tree-col';
  const h=document.createElement('div'); h.className='col-resizer'; h.title='Arraste ↔ para aumentar ou diminuir este quadro';
  el.appendChild(h);
  h.addEventListener('pointerdown',function(e){
    e.preventDefault(); e.stopPropagation();
    const ws=document.getElementById('ws'); if(ws)ws.classList.add('resizing');
    const startX=e.clientX, startW=viewPrefs()[key];
    try{h.setPointerCapture(e.pointerId);}catch(_){}
    function move(ev){ let w=Math.round(startW+(ev.clientX-startX)); w=Math.max(min,Math.min(max,w)); if(!data.viewPrefs)data.viewPrefs={}; data.viewPrefs[key]=w; document.documentElement.style.setProperty(cssVar,w+'px'); }
    function up(){ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); if(ws)ws.classList.remove('resizing'); persist(); }
    document.addEventListener('pointermove',move); document.addEventListener('pointerup',up);
  });
}

/* ---------- navegação por nós ---------- */
function findNb(id){return data.notebooks.find(n=>n.id===id)}
function walk(nodes,fn,parent=null,path=[]){for(const n of nodes){fn(n,parent,path);if(n.children)walk(n.children,fn,n,[...path,n]);}}
function findNode(nbId,nodeId){let r=null;const nb=findNb(nbId);if(!nb)return null;walk(nb.children||[],(n,p,path)=>{if(n.id===nodeId)r={node:n,parent:p,path};});return r;}
function nodeDepth(nbId,nodeId){const f=findNode(nbId,nodeId);return f?f.path.length+1:0;}
function kindLabel(depth){return depth===1?'Subcaderno':depth===2?'Nível 1':depth===3?'Nível 2':depth===4?'Nível 3':'Item';}
function newNode(name,depth){const o={id:uid(),name:name||'Sem título',content:'',materials:{},children:[]};MAT_TYPES.forEach(m=>o.materials[m.key]=[]);return o;}
function newNotebook(name){const nb={id:uid(),name:name,color:NB_COLORS[data.notebooks.length%NB_COLORS.length],createdAt:Date.now(),children:[],ai:{messages:[]}};return nb;}
function countMaterials(node){let c=0;if(node.materials)Object.values(node.materials).forEach(a=>c+=a.length);return c;}
function countLinked(nodeId){let c=0;(data.teses||[]).forEach(t=>{if((t.links||[]).includes(nodeId))c++;});(data.sumulas||[]).forEach(t=>{if((t.links||[]).includes(nodeId))c++;});return c;}
function countNodes(nb){let c=0;walk(nb.children||[],()=>c++);return c;}

function _plain(h){const d=document.createElement('div');d.innerHTML=h||'';return (d.textContent||'').replace(/\s+/g,' ').trim();}
function _snip(text,q){text=(text||'').replace(/\s+/g,' ').trim();const i=text.toLowerCase().indexOf(q.toLowerCase());if(i<0)return text.slice(0,150);const st=Math.max(0,i-55);return (st>0?'… ':'')+text.slice(st,st+170)+(text.length>st+170?' …':'');}
function _hl(text,q){const i=(text||'').toLowerCase().indexOf(q.toLowerCase());if(i<0)return esc(text);return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));}
function globalSearch(q){
  const box=$('#globalResults'); if(!box)return;
  q=(q||'').trim();
  if(q.length<2){box.innerHTML='';return;}
  const ql=q.toLowerCase(); const res=[]; const CAP=200; const add=o=>{if(res.length<CAP)res.push(o);};
  (data.notebooks||[]).forEach(nb=>walk(nb.children||[],(n,p,path)=>{
    const onde=[nb.name,...path.map(x=>x.name),n.name].join(' › ');
    if((n.name||'').toLowerCase().includes(ql))add({tipo:'Subpasta',col:'#1c4f8b',onde,snip:n.name,nbId:nb.id,nodeId:n.id,tab:'editor'});
    const txt=_plain(n.content);
    if(txt.toLowerCase().includes(ql))add({tipo:'Doutrina',col:'#6b4a28',onde,snip:_snip(txt,q),nbId:nb.id,nodeId:n.id,tab:'editor'});
    MAT_TYPES.forEach(m=>((n.materials&&n.materials[m.key])||[]).forEach(it=>{const hay=((it.title||'')+' '+(it.body||'')+' '+(it.source||'')).toLowerCase();if(hay.includes(ql))add({tipo:m.label,col:'#1e7b34',onde,snip:_snip((it.title||'')+' — '+(it.body||it.source||''),q),nbId:nb.id,nodeId:n.id,tab:'materiais'});}));
  }));
  (data.teses||[]).forEach(t=>{const hay=((t.tema||'')+' '+(t.teseFirmada||'')+' '+(t.orgao||'')+' '+(t.ramo||'')+' '+(t.processo||'')+' '+(t.obs||'')).toLowerCase();if(hay.includes(ql))add({tipo:'Tese',col:'#7b1e1e',onde:[t.orgao,t.ramo].filter(Boolean).join(' · '),snip:_snip((t.tema||'')+' — '+(t.teseFirmada||''),q),teseId:t.id});});
  (data.sumulas||[]).forEach(t=>{const hay=((t.tema||'')+' '+(t.enunciado||'')+' '+(t.orgao||'')+' '+(t.ramo||'')+' '+(t.obs||'')).toLowerCase();if(hay.includes(ql))add({tipo:'Súmula',col:'#8a6608',onde:[t.orgao,t.ramo].filter(Boolean).join(' · '),snip:_snip((t.tema||'')+' — '+(t.enunciado||''),q),sumId:t.id});});
  if(!res.length){box.innerHTML=`<div class="empty" style="padding:14px">Nada encontrado para “${esc(q)}”.</div>`;return;}
  box.innerHTML=`<div class="src" style="margin:8px 0 6px">${res.length}${res.length>=CAP?'+':''} resultado(s)</div>`+res.map(r=>{
    const click=r.teseId?`openTeseResult('${r.teseId}')`:r.sumId?`openSumResult('${r.sumId}')`:`openNodeResult('${r.nbId}','${r.nodeId}','${r.tab}')`;
    return `<div class="gs-item" onclick="${click}"><div><span class="typetag" style="background:${r.col}">${esc(r.tipo)}</span> <span class="gs-where">${esc(r.onde)}</span></div><div class="gs-snip">${_hl(r.snip,q)}</div></div>`;
  }).join('');
}

function treeLi(nbId,node){

/* aplica tamanho A4 + margens (cm) à folha e desenha a régua */
function applyPageSetup(){
  const ps=data.pageSetup, sz=PAGE_SIZES[ps.size]||PAGE_SIZES.A4;
  const ed=document.getElementById('editor'); if(!ed)return;
  ed.style.width=sz.w+'cm'; ed.style.minHeight=sz.h+'cm';
  ed.style.paddingTop=ps.top+'cm'; ed.style.paddingRight=ps.right+'cm';
  ed.style.paddingBottom=ps.bottom+'cm'; ed.style.paddingLeft=ps.left+'cm';
  buildRulerCm();
}
function buildRulerCm(){
  const ps=data.pageSetup, sz=PAGE_SIZES[ps.size]||PAGE_SIZES.A4;
  const r=document.getElementById('rulerH'); if(!r)return;
  r.style.width=sz.w+'cm';
  const n=Math.round(sz.w); let h='';
  for(let i=0;i<=n;i++){ h+=`<span class="rk" style="left:${i}cm"></span><span class="rn" style="left:${i}cm">${i}</span>`; if(i<n)h+=`<span class="rk minor" style="left:${i+0.5}cm"></span>`; }
  h+=`<span class="rmargin" style="left:0;width:${ps.left}cm"></span>`;
  h+=`<span class="rmargin" style="left:${sz.w-ps.right}cm;width:${ps.right}cm"></span>`;
  h+=`<span class="rhandle" id="hLeft" style="left:${ps.left}cm" title="Margem esquerda"></span>`;
  h+=`<span class="rhandle" id="hRight" style="left:${sz.w-ps.right}cm" title="Margem direita"></span>`;
  r.innerHTML=h;
  attachHandle('hLeft','left'); attachHandle('hRight','right');

function applyPageSetupLive(){
  const ps=data.pageSetup, sz=PAGE_SIZES[ps.size]||PAGE_SIZES.A4;
  const ed=document.getElementById('editor'); if(ed){ed.style.paddingLeft=ps.left+'cm';ed.style.paddingRight=ps.right+'cm';}
  const hl=document.getElementById('hLeft'),hr=document.getElementById('hRight');
  if(hl)hl.style.left=ps.left+'cm'; if(hr)hr.style.left=(sz.w-ps.right)+'cm';
  const sh=document.querySelectorAll('#rulerH .rmargin');
  if(sh[0])sh[0].style.width=ps.left+'cm';
  if(sh[1]){sh[1].style.left=(sz.w-ps.right)+'cm';sh[1].style.width=ps.right+'cm';}
}
function attachHandle(id,which){
  const h=document.getElementById(id); if(!h)return;
  h.addEventListener('pointerdown',e=>{
    e.preventDefault();
    const r=document.getElementById('rulerH'); const sz=PAGE_SIZES[data.pageSetup.size]||PAGE_SIZES.A4;
    const rect=r.getBoundingClientRect(); const pxcm=rect.width/sz.w;
    const move=ev=>{
      let cm=(ev.clientX-rect.left)/pxcm; cm=Math.round(cm*10)/10;
      if(which==='left'){ cm=Math.max(0,Math.min(cm, sz.w-data.pageSetup.right-1)); data.pageSetup.left=cm; }
      else { let rm=sz.w-cm; rm=Math.max(0,Math.min(rm, sz.w-data.pageSetup.left-1)); data.pageSetup.right=rm; }
      applyPageSetupLive();
    };
    const up=()=>{document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);persist();};
    document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);
  });
}

function commitEditor(){const ed=$('#editor');if(ed&&cur.nodeId){const f=findNode(cur.nbId,cur.nodeId);if(f){f.node.content=ed.innerHTML;persist();}}}
function currentEditorRange(){const s=window.getSelection&&window.getSelection();if(s&&s.rangeCount){const r=s.getRangeAt(0);const ed=$('#editor');if(ed&&ed.contains(r.commonAncestorContainer))return r;}return null;}

function getCellFromRange(r){if(!r)return null;let n=r.commonAncestorContainer;if(n&&n.nodeType===3)n=n.parentNode;const ed=$('#editor');while(n&&n!==ed){if(n.tagName==='TD'||n.tagName==='TH')return n;n=n.parentNode;}return null;}
function captureEditorCtx(){savedRange=currentEditorRange();savedCell=getCellFromRange(savedRange);}
function openTablePop(){captureEditorCtx();togglePop('popTable');}
function insertTable(){
  const rEl=document.getElementById('tbRows'),cEl=document.getElementById('tbCols');
  const r=Math.max(1,Math.min(20,parseInt(rEl&&rEl.value)||3));
  const c=Math.max(1,Math.min(10,parseInt(cEl&&cEl.value)||3));
  let h='<table class="doc-table"><tbody>';
  for(let i=0;i<r;i++){h+='<tr>';for(let j=0;j<c;j++)h+='<td><br></td>';h+='</tr>';}
  h+='</tbody></table><p><br></p>';
  restoreRange();document.execCommand('insertHTML',false,h);commitEditor();
}
function tableOp(op){
  const cell=getCellFromRange(currentEditorRange())||savedCell;
  const ed=$('#editor');
  if(!cell||!ed||!ed.contains(cell)){toast('Coloque o cursor dentro de uma célula da tabela.','err');return;}
  const table=cell.closest('table');const row=cell.parentElement;const rows=[...table.rows];const ri=rows.indexOf(row);const ci=cell.cellIndex;
  if(op==='rowAfter'){const tr=document.createElement('tr');for(let k=0;k<row.children.length;k++){const td=document.createElement('td');td.innerHTML='<br>';tr.appendChild(td);}row.after(tr);}
  else if(op==='colAfter'){rows.forEach(rr=>{const ref=rr.children[ci];const td=document.createElement('td');td.innerHTML='<br>';if(ref)ref.after(td);else rr.appendChild(td);});}
  else if(op==='delRow'){if(rows.length>1)row.remove();else toast('A tabela precisa de ao menos 1 linha.','err');}
  else if(op==='delCol'){const ncols=Math.max.apply(null,rows.map(rr=>rr.children.length));if(ncols>1)rows.forEach(rr=>{if(rr.children[ci])rr.children[ci].remove();});else toast('A tabela precisa de ao menos 1 coluna.','err');}
  else if(op==='mergeRight'){const nx=cell.nextElementSibling;if(!nx){toast('Não há célula à direita.','err');return;}cell.colSpan=(cell.colSpan||1)+(nx.colSpan||1);if(nx.innerHTML.replace(/<br\s*\/?>/gi,'').trim())cell.innerHTML+=' '+nx.innerHTML;nx.remove();}
  else if(op==='mergeDown'){const below=rows[ri+1];const tgt=below&&below.children[ci];if(!tgt){toast('Não há célula abaixo.','err');return;}cell.rowSpan=(cell.rowSpan||1)+(tgt.rowSpan||1);if(tgt.innerHTML.replace(/<br\s*\/?>/gi,'').trim())cell.innerHTML+=' '+tgt.innerHTML;tgt.remove();}
  else if(op==='split'){const cs=cell.colSpan||1,rs=cell.rowSpan||1;cell.colSpan=1;cell.rowSpan=1;
    for(let k=1;k<cs;k++){const td=document.createElement('td');td.innerHTML='<br>';cell.after(td);}
    for(let k=1;k<rs;k++){const rr=rows[ri+k];if(rr){const td=document.createElement('td');td.innerHTML='<br>';const ref=rr.children[ci];if(ref)ref.before(td);else rr.appendChild(td);}}
  }
  commitEditor();
}

function insertImageHTML(src){restoreRange();document.execCommand('insertHTML',false,'<img src="'+src+'" style="max-width:100%"><p><br></p>');commitEditor();}
function downscaleToDataURL(file,maxW,q,cb){const fr=new FileReader();fr.onload=e=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);let out;try{out=cv.toDataURL('image/jpeg',q);}catch(err){out=e.target.result;}cb(out);};img.onerror=()=>cb(e.target.result);img.src=e.target.result;};fr.onerror=()=>toast('Falha ao ler a imagem.','err');fr.readAsDataURL(file);}

/* ---------- helpers ---------- */
function pvToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function pvYmd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function pvParse(s){return /^\d{4}-\d{2}-\d{2}$/.test(s||'')?new Date(s+'T00:00:00'):null;}
function provaById(id){return (data.provas||[]).find(p=>p.id===id);}
function pvMigrate(p){p.inicio=p.inicio||pvToday();if(!p.dataProva)p.dataProva=(/^\d{4}-\d{2}-\d{2}$/.test(p.data||'')?p.data:'');p.disciplinas=p.disciplinas||[];p.dias=p.dias||{};p.pomo=p.pomo||{day:'',focusToday:0,total:0};if(p.manualPPD===undefined)p.manualPPD=null;return p;}
function pvTotals(p){let t=0,r=0;(p.disciplinas||[]).forEach(d=>{t+=(+d.total||0);r+=Math.min(+d.read||0,+d.total||0);});return{total:t,read:r,pct:t>0?Math.min(100,Math.round(r/t*100)):0};}
function pvActiveDaysLeft(p){const e=pvParse(p.dataProva);if(!e)return 0;const s=pvParse(p.inicio)||new Date();let t=new Date();t.setHours(0,0,0,0);let cur=new Date(t<s?s:t),n=0;while(cur<=e){if(p.dias[pvYmd(cur)]!=='missed')n++;cur.setDate(cur.getDate()+1);}return n;}
function pvDailyTarget(p){if(p.manualPPD)return p.manualPPD;const {total,read}=pvTotals(p);const left=Math.max(0,total-read);const ad=pvActiveDaysLeft(p);return ad>0?Math.ceil(left/ad):0;}
function pvDaysToExam(p){const e=pvParse(p.dataProva);if(!e)return null;let t=new Date();t.setHours(0,0,0,0);return Math.max(0,Math.round((e-t)/86400000));}
function pvStudied(p){return Object.values(p.dias||{}).filter(v=>v==='studied').length;}
function pvStreak(p){let n=0,d=new Date();d.setHours(0,0,0,0);if(p.dias[pvYmd(d)]!=='studied')d.setDate(d.getDate()-1);while(p.dias[pvYmd(d)]==='studied'){n++;d.setDate(d.getDate()-1);}return n;}
function pvCurDisc(p){return (p.disciplinas||[]).find(d=>!((+d.total>0)&&(+d.read>=+d.total)));}

function pvCalendario(p){
  const s=pvParse(p.inicio),e=pvParse(p.dataProva);
  if(!s||!e||e<s)return `<div class="empty">Defina “Início dos estudos” e “Data da prova” em ⚙️ Config.</div>`;
  const mn=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const wd=['D','S','T','Q','Q','S','S'];
  let cur2=new Date(s.getFullYear(),s.getMonth(),1);const last=new Date(e.getFullYear(),e.getMonth(),1);
  let html=`<div style="font-size:12px;color:var(--ink-soft);margin-bottom:10px">Clique para alternar: pendente → <b style="color:#1e7b34">estudei</b> → <b style="color:#c0392b">não estudei</b>. Dias “não estudei” reduzem os dias úteis e aumentam a meta diária. 🟡 = dia da prova.</div><div class="pv-cal-wrap">`;
  let guard=0;
  while(cur2<=last&&guard++<60){
    const y=cur2.getFullYear(),m=cur2.getMonth();
    html+=`<div class="pv-cal"><h5>${mn[m]} ${y}</h5><div class="pv-cg">`+wd.map(w=>`<div class="pv-wd">${w}</div>`).join('');
    const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
    for(let i=0;i<fd;i++)html+='<div></div>';
    for(let dd=1;dd<=dim;dd++){
      const k=`${y}-${String(m+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
      const dt=pvParse(k),inR=dt>=s&&dt<=e;let cls='pv-d';
      if(!inR)cls+=' out';
      else if(k===p.dataProva)cls+=' exam';
      else{const stt=p.dias[k];if(stt==='studied')cls+=' studied';else if(stt==='missed')cls+=' missed';if(k===pvToday())cls+=' tdy';}
      const clickable=inR&&k!==p.dataProva;
      html+=`<div class="${cls}" ${clickable?`onclick="pvCycleDay('${k}')"`:''} title="${k}${k===p.dataProva?' · PROVA':''}">${dd}</div>`;
    }
    html+='</div></div>';cur2.setMonth(cur2.getMonth()+1);
  }
  html+='</div>';return html;
}
function pvCycleDay(k){const p=provaById(cur.provaId);if(!p)return;const st=p.dias[k];if(!st)p.dias[k]='studied';else if(st==='studied')p.dias[k]='missed';else delete p.dias[k];persist();showProvas();}
function pvSetDay(k,v){const p=provaById(cur.provaId);if(!p)return;p.dias[k]=v;persist();showProvas();}

function pvStats(p){

function tesesAll(){
  const repo=(data.teses||[]).map(t=>({...t,_origem:'repo'}));
  const fromNb=[];
  data.notebooks.forEach(nb=>{
    walk(nb.children||[],(n,p,path)=>{
      ((n.materials&&n.materials.tese)||[]).forEach(it=>{
        fromNb.push({id:it.id,_origem:'caderno',_nodeId:n.id,tema:it.title,teseFirmada:it.body,processo:it.source,ramo:nb.name,_nb:nb.name,_path:[...path.map(x=>x.name),n.name].join(' › '),createdAt:it.createdAt});
      });
    });
  });
  return {repo,fromNb};
}

function setTeseQuery(v){cur.tesesFilter.q=v;renderTesesList();}
function setTeseFilter(k,v){cur.tesesFilter[k]=v;if(k==='node'){$('#view').innerHTML=renderTeses();}renderTesesList();}
function renderTesesList(){
  const box=$('#tesesList'); if(!box)return;
  const f=cur.tesesFilter; const {repo,fromNb}=tesesAll();
  let list=[];
  if(f.origem!=='caderno') list=list.concat(repo);
  if(f.origem!=='repo') list=list.concat(fromNb);
  const q=(f.q||'').toLowerCase();
  const dDe=f.dataDe?+f.dataDe.replace(/-/g,''):null, dAte=f.dataAte?+f.dataAte.replace(/-/g,''):null;
  list=list.filter(t=>{
    if(t._origem==='repo'){
      if(f.orgao&&t.orgao!==f.orgao)return false;
      if(f.tipo&&t.tipo!==f.tipo)return false;
      if(f.status&&t.status!==f.status)return false;
      if(f.ramo&&t.ramo!==f.ramo)return false;
      if(f.node&&!((t.links||[]).includes(f.node)))return false;
    }else{
      if(f.orgao||f.tipo||f.status)return false; /* itens de caderno não têm esses atributos */
      if(f.ramo&&t.ramo!==f.ramo)return false;
      if(f.node&&t._nodeId!==f.node)return false;
    }
    if(f.tema){const tv=(t.tema||'').trim();if(f.tema==='__none'){if(tv)return false;}else if(tv!==f.tema)return false;}
    if(dDe||dAte){const dv=_pdate(t.data);if(dv==null)return false;if(dDe&&dv<dDe)return false;if(dAte&&dv>dAte)return false;}
    if(q){const noNum=((t.tema||'').trim())?'':' sem número sem numero';const hay=((t.tema||'')+' '+(t.teseFirmada||'')+' '+(t.processo||'')+' '+(t.ramo||'')+' '+(t.orgao||'')+' '+(t.obs||'')+' '+(t.origem||'')+' '+(t.data||'')+noNum).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  list.sort((a,b)=>{const na=temaNum(a.tema),nb=temaNum(b.tema);if(na!==nb)return na-nb;return (a.tema||'').localeCompare(b.tema||'','pt');});
  const CAP=300, shown=list.slice(0,CAP);
  box.innerHTML=`<div style="margin:4px 0 10px;font-size:12px;color:var(--ink-soft);font-weight:600">${list.length} tese(s)${list.length>CAP?' — mostrando '+CAP+'; use a busca/filtros/subpasta para refinar':''}</div>
    <div class="mat-list" style="max-height:none">${shown.length?shown.map(teseCard).join(''):`<div class="empty">Nenhuma tese encontrada.<br>Cadastre com “＋ Nova tese”, importe do BNP ou pergunte à IA.</div>`}</div>`;
}

    return `<div class="mat"><div class="mh"><span class="typetag t-tese">Caderno</span><span class="mt">${esc(t.tema||'Sem número')}</span></div>
      <div class="src">🗂 ${esc(t._nb)} › ${esc(t._path)} ${t.processo?'· 📌 '+esc(t.processo):''}</div>
      ${t.teseFirmada?`<div class="bd">${esc(t.teseFirmada)}</div>`:''}

  }

  return `<div class="mat"><div class="mh">${chips}<span class="mt">${esc(t.tema||'Sem número')}</span></div>
    <div class="src">${t.ramo?'📚 '+esc(t.ramo):''}${t.processo?' · ⚖ '+esc(t.processo):''}${t.data?' · 📅 '+esc(t.data):''}${t.origem?' · 🏷 '+esc(t.origem):''}</div>
    ${t.teseFirmada?`<div class="bd">${esc(t.teseFirmada)}</div>`:''}
    ${t.obs?`<div class="bd" style="font-style:italic;color:var(--ink-soft)">📝 ${esc(t.obs)}</div>`:''}
    ${(cadChip||links)?`<div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap">${cadChip} ${links}</div>`:''}
    <div class="mfoot"><button class="mini" onclick="teseModal('${t.id}')">✎ Editar</button><button class="mini" onclick="delTese('${t.id}')">🗑 Excluir</button></div></div>`;
}

let _importPreview=[], _importSuggest=true, _nodeIndex=null;
const _STOP=new Set(['direito','de','da','do','das','dos','e','a','o','as','os','em','no','na','ao','aos','art','artigo','lei','sobre','para','com','por','que','dos','tjsc','trf','trf6','nivel','subcaderno','geral','gerais','tema','teses','tese','questao','questão']);
function _tok(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(w=>w.length>3&&!_STOP.has(w));}
function buildNodeIndex(){_nodeIndex=[];data.notebooks.forEach(nb=>walk(nb.children||[],n=>{_nodeIndex.push({id:n.id,toks:new Set(_tok(n.name))});}));}
function suggestNode(text){if(!_nodeIndex)buildNodeIndex();const tt=_tok(text);if(!tt.length)return null;let best=null,bs=0;for(const nd of _nodeIndex){let s=0;tt.forEach(w=>{if(nd.toks.has(w))s++;});if(s>bs){bs=s;best=nd.id;}}return bs>=2?best:null;}
function openImport(){

    <div class="field"><label>Cole aqui os resultados copiados</label><textarea id="impText" style="min-height:170px" placeholder="Cole o texto das páginas de resultados do BNP…"></textarea></div>

function commitImport(){
  if(!_importPreview.length)return;
  _nodeIndex=null; if(_importSuggest)buildNodeIndex();
  data.teses=data.teses||[]; data.cats.status=data.cats.status||[]; data.cats.orgaos=data.cats.orgaos||[];
  const seen=new Set(data.teses.map(teseSig));

    if(_importSuggest){const nid=suggestNode((t.tema||'')+' '+(t.questao||''));if(nid){o.links=[nid];o.obs='Subpasta sugerida (revisar)';}}

/* Leitor calibrado para o formato do Pangea/BNP:
   <Órgão> / "Última Atualização: dd/mm/aaaa" / <Título> / Questão:/Tese:/Ementa:/Ato impugnado: / Situação: */
function parseBNP(raw){
  const lines=(raw||'').replace(/\r/g,'').split('\n').map(l=>l.trim());
  const ORG=/^(STF|STJ|TST|TSE|STM|TNU|TJSC|TJ[A-Z]{2}|TRF\s?-?\s?[1-6])$/;
  const UA=/^Última Atualiza[çc][ãa]o\s*:/i;
  const starts=[];
  for(let i=0;i<lines.length-1;i++){ if(ORG.test(lines[i]) && UA.test(lines[i+1])) starts.push(i); }
  const cards=[];
  for(let s=0;s<starts.length;s++){
    const a=starts[s], b=(s+1<starts.length)?starts[s+1]:lines.length;
    const seg=lines.slice(a,b).filter(Boolean);
    if(seg.length<2) continue;
    const orgao=seg[0].replace(/\s|-/g,'');
    const data=((seg[1].match(/(\d{2}\/\d{2}\/\d{4})/))||[])[1]||'';
    const titulo=seg[2]||'';
    let questao='',tese='',ementa='',ato='',situacao='',cur=null;
    const NOISE=/^(\*|©|\[|Lei Comentada|Todas as categorias|Anota|Artigos$|Selecione um trecho|Mostrar s[óo]|★|📖|📚|📄|⬇|⬆|☁|↑|↓|×|Sobre$|Manual$|Painel|Pesquisa avançada|Filtrar pesquisa|Data de atualiza|at[ée]$|Filtros aplicados|Foram encontrados|Itens por p[áa]gina|Ver hist[óo]rico|Decis[õo]es$|Processos$|Suspens[ãa]o$|\d+\s+de\s+\d+\s*$|^[\d\s]+$)/i;
    for(let k=3;k<seg.length;k++){
      let ln=seg[k];
      if(NOISE.test(ln)) continue;
      if(/^Quest[ãa]o\s*:/i.test(ln)){cur='q';questao=ln.replace(/^Quest[ãa]o\s*:\s*/i,'');continue;}
      if(/^Tese\s*:/i.test(ln)){cur='t';tese=ln.replace(/^Tese\s*:\s*/i,'');continue;}
      if(/^Ementa\s*:/i.test(ln)){cur='e';ementa=ln.replace(/^Ementa\s*:\s*/i,'');continue;}
      if(/^Ato impugnado\s*:/i.test(ln)){cur='a';ato=ln.replace(/^Ato impugnado\s*:\s*/i,'');continue;}
      if(/^Situa[çc][ãa]o\s*:/i.test(ln)){situacao=ln.replace(/^Situa[çc][ãa]o\s*:\s*/i,'').replace(/\s*\|\s*$/,'');cur=null;continue;}
      if(/^Ver mais$/i.test(ln)) continue;
      if(cur==='q')questao+=' '+ln; else if(cur==='t')tese+=' '+ln; else if(cur==='e')ementa+=' '+ln; else if(cur==='a')ato+=' '+ln;
    }
    situacao=situacao.replace(/\s*\|\s*$/,'').replace(/\s+/g,' ').trim();
    const body=[questao&&('Questão: '+questao.trim()), tese&&('Tese: '+tese.trim()), ementa&&('Ementa: '+ementa.trim()), ato&&('Ato impugnado: '+ato.trim())].filter(Boolean).join('\n\n');
    if(titulo||body) cards.push({orgao,data,tema:titulo,questao:body,situacao});
  }
  return cards;
}

function initGoogleClient(){
  if(!settings.clientId||typeof google==='undefined'||!google.accounts){return false;}
  drive.client=google.accounts.oauth2.initTokenClient({
    client_id:settings.clientId,
    scope:'https://www.googleapis.com/auth/drive.file',
    callback:async resp=>{
      if(resp.error){toast('Falha no login: '+resp.error,'err');setDriveUI('off');return;}
      drive.token=resp.access_token;drive.exp=Date.now()+(resp.expires_in||3500)*1000;
      drive.connected=true;setDriveUI('on');toast('Conectado ao Google Drive.','ok');
      await drive.syncOnConnect();
      if(cur.screen==='home')go('home');
    }
  });
  return true;
}

  setDriveUI('sync');

}

async function ensureToken(){if(drive.token&&Date.now()<drive.exp-60000)return true;return new Promise(res=>{const old=drive.client.callback;drive.client.callback=async r=>{if(r.access_token){drive.token=r.access_token;drive.exp=Date.now()+(r.expires_in||3500)*1000;}drive.client.callback=old;res(!!r.access_token);};drive.client.requestAccessToken({prompt:''});});}
function dHead(){return {'Authorization':'Bearer '+drive.token}}

drive.findFile=async function(){
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent("name='"+DRIVE_FILE+"' and trashed=false")}&spaces=drive&fields=files(id,name,modifiedTime)`,{headers:dHead()});
  const j=await r.json();return j.files&&j.files[0]?j.files[0]:null;
};
drive.download=async function(id){const r=await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,{headers:dHead()});return await r.json();};
drive.create=async function(content){
  const boundary='-------codex'+uid();const meta={name:DRIVE_FILE,mimeType:'application/json'};
  const body=`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(content)}\r\n--${boundary}--`;
  const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{...dHead(),'Content-Type':'multipart/related; boundary='+boundary},body});
  const j=await r.json();return j.id;
};
drive.update=async function(id,content){await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`,{method:'PATCH',headers:{...dHead(),'Content-Type':'application/json'},body:JSON.stringify(content)});};
drive.payload=()=>({version:data.version,updatedAt:data.updatedAt,provas:data.provas,notebooks:data.notebooks,styles:data.styles,pageSetup:data.pageSetup,teses:data.teses,tesesChat:data.tesesChat,sumulas:data.sumulas,sumulasChat:data.sumulasChat,cats:data.cats,pomo:data.pomo,viewPrefs:data.viewPrefs});

drive.syncOnConnect=async function(){
  try{
    if(!await ensureToken())return;
    setDriveUI('sync');
    const f=await drive.findFile();
    if(f){drive.fileId=f.id;const remote=await drive.download(f.id);
      const localEmpty=!data.notebooks.length&&!(data.provas||[]).length;
      if(remote&&(remote.updatedAt>=(data.updatedAt||0)||localEmpty)){
        data.notebooks=remote.notebooks||[];data.provas=remote.provas||[];data.updatedAt=remote.updatedAt||Date.now();
        if(remote.styles&&remote.styles.length)data.styles=remote.styles;
        if(remote.pageSetup)data.pageSetup=remote.pageSetup;
        if(remote.teses)data.teses=remote.teses;
        if(remote.tesesChat)data.tesesChat=remote.tesesChat;
        if(remote.sumulas)data.sumulas=remote.sumulas;
        if(remote.sumulasChat)data.sumulasChat=remote.sumulasChat;
        if(remote.cats)data.cats=remote.cats;
        if(remote.pomo)data.pomo=remote.pomo;
        if(remote.viewPrefs)data.viewPrefs=remote.viewPrefs;
        applyViewPrefs();
        localStorage.setItem('mag_data',JSON.stringify(data));
        stripEditalTags();
        cur.nbId=data.notebooks[0]?.id||null;cur.nodeId=null;
        if(cur.screen==='cadernos')renderCadernos();
        toast('Material carregado do Drive.','ok');
      }else{await drive.update(f.id,drive.payload());toast('Material local enviado ao Drive.','ok');}
    }else{drive.fileId=await drive.create(drive.payload());toast('Arquivo criado no seu Drive.','ok');}
    setDriveUI('on');
  }catch(e){toast('Erro de sincronização: '+e.message,'err');setDriveUI('on');}
};
drive.save=async function(){
  if(!drive.connected)return;
  try{if(!await ensureToken())return;setDriveUI('sync');
    if(!drive.fileId){const f=await drive.findFile();drive.fileId=f?f.id:await drive.create(drive.payload());}
    else await drive.update(drive.fileId,drive.payload());
    setDriveUI('on');
  }catch(e){setDriveUI('on');}
};
async function drivePull(){if(!drive.connected){toast('Conecte o Drive.','err');return;}if(!await ensureToken())return;const f=await drive.findFile();if(!f){toast('Nenhum arquivo no Drive ainda.');return;}drive.fileId=f.id;const r=await drive.download(f.id);data.notebooks=r.notebooks||[];data.provas=r.provas||[];data.updatedAt=r.updatedAt||Date.now();if(r.styles&&r.styles.length)data.styles=r.styles;if(r.pageSetup)data.pageSetup=r.pageSetup;if(r.teses)data.teses=r.teses;if(r.tesesChat)data.tesesChat=r.tesesChat;if(r.sumulas)data.sumulas=r.sumulas;if(r.sumulasChat)data.sumulasChat=r.sumulasChat;if(r.cats)data.cats=r.cats;if(r.pomo)data.pomo=r.pomo;localStorage.setItem('mag_data',JSON.stringify(data));stripEditalTags();cur.nbId=data.notebooks[0]?.id||null;cur.nodeId=null;toast('Baixado do Drive.','ok');closeModal();go(cur.screen||'home');}
async function drivePush(){if(!drive.connected){toast('Conecte o Drive.','err');return;}await drive.save();toast('Enviado ao Drive.','ok');}

function setDriveUI(state){
  const dot=$('#driveDot'),txt=$('#driveText');if(!dot)return;
  dot.className='dot'+(state==='on'?' on':state==='sync'?' sync':'');
  txt.textContent=state==='on'?'Drive conectado':state==='sync'?'Sincronizando…':'Offline';
}

/* ============================================================
   VÍNCULO AUTOMÁTICO POR RAMO + IMPORTADOR INTELIGENTE (IA)
   ============================================================ */
function _norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\bdireito\b/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();}
function cadernoForRamo(ramo){if(!ramo)return null;const r=_norm(ramo);if(!r)return null;let nb=data.notebooks.find(n=>_norm(n.name)===r);if(nb)return nb;return data.notebooks.find(n=>{const nn=_norm(n.name);return nn&&(nn===r||nn.includes(r)||r.includes(nn));})||null;}
function bestSubpastaIn(nb,text){const tt=_tok(text);if(!tt.length)return null;let best=null,bs=0;walk(nb.children||[],n=>{const toks=new Set(_tok(n.name));let s=0;tt.forEach(w=>{if(toks.has(w))s++;});if(s>bs){bs=s;best=n.id;}});return bs>=1?best:null;}
function autoLinkRamo(ramo,text){const nb=cadernoForRamo(ramo);if(!nb)return [];const sp=bestSubpastaIn(nb,text);return sp?[sp]:[];}
function autoLinkAllByRamo(){
  confirmModal('Vincular pelo ramo','Para cada tese com um ramo informado, vincular automaticamente à subpasta mais próxima do caderno correspondente? (não remove vínculos já existentes)',()=>{
    let n=0;(data.teses||[]).forEach(t=>{if(!t.ramo)return;const add=autoLinkRamo(t.ramo,(t.tema||'')+' '+(t.teseFirmada||''));if(add.length){t.links=t.links||[];add.forEach(id=>{if(!t.links.includes(id)){t.links.push(id);n++;}});}});
    persist();closeModal();toast(n+' vínculo(s) criado(s) pelo ramo.','ok');if(cur.screen==='teses')renderTesesList();
  });
}
/* assinatura única por nº (órgão + tema/identificação) para evitar duplicidades */
function teseSig(t){return ((t.orgao||'')+'|'+((t.tema||'').trim().toLowerCase().replace(/\s+/g,' '))).trim();}
/* extrai o último número do tema (para ordenar); sem número = Infinity (vai pro fim) */
function temaNum(s){const m=String(s||'').match(/(\d+)(?!.*\d)/);return m?parseInt(m[1],10):Infinity;}
/* converte "dd/mm/aaaa" ou "aaaa-mm-dd" em número aaaammdd comparável */
function _pdate(s){if(!s)return null;let m=String(s).match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m)return +(m[3]+m[2].padStart(2,'0')+m[1].padStart(2,'0'));m=String(s).match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return +(m[1]+m[2]+m[3]);return null;}
function dedupeTeses(){
  confirmModal('Remover teses duplicadas','Juntar teses do repositório com o MESMO órgão e número/identificação (campo "Tema")? Mantém a primeira e mescla vínculos, observações e data. Não pode ser desfeito.',()=>{
    const map={},order=[];let removed=0;
    (data.teses||[]).forEach(t=>{const k=teseSig(t);if(k==='|'){const uk='__u'+order.length;map[uk]=t;order.push(uk);return;}if(map[k]){const keep=map[k];keep.links=[...new Set([...(keep.links||[]),...(t.links||[])])];if(!keep.teseFirmada&&t.teseFirmada)keep.teseFirmada=t.teseFirmada;if(!keep.obs&&t.obs)keep.obs=t.obs;if(!keep.data&&t.data)keep.data=t.data;removed++;}else{map[k]=t;order.push(k);}});
    data.teses=order.map(k=>map[k]).filter(Boolean);
    persist();closeModal();toast(removed+' tese(s) duplicada(s) removida(s).','ok');if(cur.screen==='teses'){$('#view').innerHTML=renderTeses();renderTesesList();}
  });
}
/* ---- importador inteligente (IA) ---- */
let _aiImp=[], _aiBusy=false, _aiImpLink=true;
function openAiImport(){
  openModal(`<h3>🤖 Importar com IA (colar de qualquer fonte)</h3>
    <p class="sub">Cole o conteúdo (de qualquer página, PDF ou site). A IA identifica órgão, ramo do direito (caderno), categoria/tipo, assunto e a tese. Você confere antes de importar. Requer API key do Gemini.</p>
    <div class="field"><textarea id="aiImpText" style="min-height:170px" placeholder="Cole aqui o texto…"></textarea></div>
    <label style="font-size:13px;display:flex;gap:8px;align-items:center"><input type="checkbox" id="aiImpLink" checked> Vincular automaticamente ao caderno/subpasta pelo ramo identificado</label>
    <div class="modal-foot"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn gold" id="aiImpBtn" onclick="analyzeAiImport()">Analisar com IA</button></div>`);
}
async function analyzeAiImport(){
  if(_aiBusy)return;const txt=(($('#aiImpText')||{}).value||'').trim();if(!txt){toast('Cole o conteúdo.','err');return;}
  if(!settings.geminiApiKey){toast('Configure a API key do Gemini em ⚙.','err');openSettings();return;}
  _aiImpLink=$('#aiImpLink')?$('#aiImpLink').checked:true;
  _aiBusy=true;const b=$('#aiImpBtn');if(b){b.disabled=true;b.textContent='Analisando…';}
  try{
    const ramos=(data.cats.ramos||[]).join('; '),tipos=(data.cats.tipos||[]).join('; '),orgs=(data.cats.orgaos||[]).join('; ');
    const sys=`Você extrai precedentes/teses/súmulas/enunciados de um texto jurídico e devolve SOMENTE um JSON array (sem texto fora do JSON). Cada item tem as chaves: "orgao" (um de: ${orgs}; senão "OUTRO"), "tipo" (categoria/subgrupo, um de: ${tipos}; senão o mais próximo), "ramo" (ramo do direito; use de preferência um destes cadernos: ${ramos}), "tema" (assunto/identificação curta), "teseFirmada" (o teor/tese/enunciado copiado do texto), "processo" (leading case, se houver), "data" (dd/mm/aaaa, se houver), "situacao" (status, se houver). NÃO invente conteúdo: use exatamente o que está no texto. Se houver vários precedentes, retorne todos.`;
    const model=settings.geminiModel||'gemini-3.5-flash';
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`,{method:'POST',headers:{'Content-Type':'application/json','x-goog-api-key':settings.geminiApiKey},body:JSON.stringify({systemInstruction:{parts:[{text:sys}]},contents:[{role:'user',parts:[{text:txt.slice(0,60000)}]}],generationConfig:{responseMimeType:'application/json',temperature:0}})});
    const j=await res.json();if(!res.ok)throw new Error(j.error?.message||('HTTP '+res.status));
    let raw=(j.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('').trim().replace(/^```json\s*/i,'').replace(/```$/,'').trim();
    let arr;try{arr=JSON.parse(raw);}catch(e){const mm=raw.match(/\[[\s\S]*\]/);if(mm)arr=JSON.parse(mm[0]);else throw new Error('A IA não retornou JSON válido.');}
    if(!Array.isArray(arr))arr=[arr];
    _aiImp=arr.filter(x=>x&&(x.tema||x.teseFirmada));
    if(!_aiImp.length){toast('A IA não identificou teses no texto.','err');return;}
    aiImpPreview();
  }catch(e){toast('Erro: '+e.message,'err');}
  finally{_aiBusy=false;const b2=$('#aiImpBtn');if(b2){b2.disabled=false;b2.textContent='Analisar com IA';}}
}
function aiImpPreview(){
  openModal(`<h3>🤖 Pré-visualização — ${_aiImp.length} item(ns)</h3><p class="sub">Confira os campos identificados pela IA antes de importar (origem: Importado IA).</p>
    <div class="mat-list" style="max-height:50vh">${_aiImp.slice(0,40).map(t=>`<div class="mat"><div class="mh">${t.orgao?`<span class="typetag t-tese">${esc(t.orgao)}</span>`:''}${t.tipo?`<span class="chip">${esc(t.tipo)}</span>`:''}<span class="mt">${esc(t.tema||'(sem assunto)')}</span></div><div class="src">${t.ramo?'📚 '+esc(t.ramo):''}${t.processo?' · ⚖ '+esc(t.processo):''}${t.data?' · 📅 '+esc(t.data):''}${t.situacao?' · '+esc(t.situacao):''}</div>${t.teseFirmada?`<div class="bd">${esc(String(t.teseFirmada).slice(0,260))}${String(t.teseFirmada).length>260?'…':''}</div>`:''}</div>`).join('')}${_aiImp.length>40?`<div class="empty">… e mais ${_aiImp.length-40}</div>`:''}</div>
    <div class="modal-foot"><button class="btn ghost" onclick="openAiImport()">← Voltar</button><button class="btn burg" onclick="commitAiImport()">Importar ${_aiImp.length}</button></div>`);
  $('#modalBox').classList.add('lg');
}
function commitAiImport(){
  if(!_aiImp.length)return;
  data.teses=data.teses||[];data.cats=data.cats||{};['orgaos','tipos','ramos','status','origens'].forEach(k=>data.cats[k]=data.cats[k]||[]);
  if(!data.cats.origens.includes('Importado (IA)'))data.cats.origens.push('Importado (IA)');
  const seen=new Set(data.teses.map(teseSig));
  let base=Date.now(),added=0,dup=0;
  _aiImp.forEach(t=>{
    const tema=(t.tema||'').toString().trim(),tese=(t.teseFirmada||'').toString().trim();
    const k=teseSig({orgao:t.orgao,tema});if(seen.has(k)){dup++;return;}seen.add(k);
    const orgao=(t.orgao||'OUTRO').toString().trim();if(orgao&&!data.cats.orgaos.includes(orgao))data.cats.orgaos.push(orgao);
    const tipo=(t.tipo||'Tese').toString().trim();if(tipo&&!data.cats.tipos.includes(tipo))data.cats.tipos.push(tipo);
    const ramo=(t.ramo||'').toString().trim();if(ramo&&!data.cats.ramos.includes(ramo))data.cats.ramos.push(ramo);
    const status=(t.situacao||'').toString().trim();if(status&&!data.cats.status.includes(status))data.cats.status.push(status);
    const o={id:'t_'+uid(),orgao,tipo,tema,processo:(t.processo||'').toString().trim(),teseFirmada:tese,ramo,data:(t.data||'').toString().trim(),status,origem:'Importado (IA)',obs:'',links:[],createdAt:base+added};
    if(_aiImpLink&&ramo)autoLinkRamo(ramo,tema+' '+tese).forEach(id=>{if(!o.links.includes(id))o.links.push(id);});
    data.teses.push(o);added++;
  });
  _aiImp=[];persist();closeModal();
  if(cur.screen==='teses'){$('#view').innerHTML=renderTeses();renderTesesList();}
  toast(added+' tese(s) importada(s) via IA'+(dup?(' · '+dup+' repetida(s)'):'')+'.','ok');
}

/* ============================================================
   SÚMULAS — repositório (cadastro manual), nos moldes de Teses
   ============================================================ */
function sumulasAll(){
  const repo=(data.sumulas||[]).map(t=>({...t,_origem:'repo'}));
  const fromNb=[];
  data.notebooks.forEach(nb=>{ walk(nb.children||[],(n,p,path)=>{ ((n.materials&&n.materials.sumula)||[]).forEach(it=>{ fromNb.push({id:it.id,_origem:'caderno',_nodeId:n.id,tema:it.title,enunciado:it.body,ramo:nb.name,_nb:nb.name,_path:[...path.map(x=>x.name),n.name].join(' › '),createdAt:it.createdAt}); }); }); });
  return {repo,fromNb};
}
function renderSumulas(){
  cur.sumFilter=cur.sumFilter||{q:'',orgao:'',status:'',ramo:'',origem:'todos',node:''};
  if(!('node' in cur.sumFilter))cur.sumFilter.node='';
  const f=cur.sumFilter, C=data.cats;
  let nodeChip='';
  if(f.node){const fn=findNodeAny(f.node);nodeChip=`<span class="chip gold" style="cursor:pointer" title="Limpar filtro de subpasta" onclick="setSumFilter('node','')">🗂 ${fn?esc(fn.nb.name+' › '+fn.node.name):'subpasta'} ✕</span>`;}
  return `<div style="max-width:1040px;margin:10px auto"><div class="panel glass" style="min-height:auto">
    <div class="panel-head"><h4 style="font-size:16px">§ Súmulas</h4>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn gold sm" onclick="openSumulasAI()">✨ IA das Súmulas</button>
        <button class="btn burg sm" onclick="sumulaModal('')">＋ Nova súmula</button>
        <button class="btn ghost sm" onclick="openCats()">⚙ Categorias</button>
        <button class="btn ghost sm" onclick="go('home')">← Início</button></div></div>
    <p class="sub" style="font-family:'EB Garamond',serif;font-style:italic;color:var(--ink-soft);margin:-2px 0 12px">Repositório de súmulas (cadastro manual) + as vinculadas nos cadernos. Vincule cada súmula a uma ou mais subpastas.</p>
    <div class="mat-tools">
      <input id="sQ" value="${esc(f.q)}" placeholder="🔎 Buscar por número, enunciado, ramo…" style="flex:1;min-width:200px;padding:9px 12px;border-radius:10px;border:1px solid rgba(0,0,0,.16);background:rgba(255,255,255,.7);font-family:inherit" oninput="setSumQuery(this.value)">
      <select class="tbtn" onchange="setSumFilter('orgao',this.value)"><option value="">Órgão</option>${C.orgaos.map(o=>`<option ${f.orgao===o?'selected':''}>${esc(o)}</option>`).join('')}</select>
      <select class="tbtn" onchange="setSumFilter('status',this.value)"><option value="">Status</option>${C.status.map(o=>`<option ${f.status===o?'selected':''}>${esc(o)}</option>`).join('')}</select>
      <select class="tbtn" onchange="setSumFilter('ramo',this.value)"><option value="">Ramo</option>${C.ramos.map(o=>`<option ${f.ramo===o?'selected':''}>${esc(o)}</option>`).join('')}</select>
      <select class="tbtn" onchange="setSumFilter('origem',this.value)"><option value="todos" ${f.origem==='todos'?'selected':''}>Todas as origens</option><option value="repo" ${f.origem==='repo'?'selected':''}>Repositório</option><option value="caderno" ${f.origem==='caderno'?'selected':''}>Dos cadernos</option></select>
      <button class="btn ghost sm" onclick="openSumSubpastaFilter()">🗂 Subpasta</button>
      ${nodeChip}
    </div>
    <div id="sumList"></div>
  </div></div>`;
}
function setSumQuery(v){cur.sumFilter.q=v;renderSumulasList();}
function setSumFilter(k,v){cur.sumFilter[k]=v;if(k==='node'){$('#view').innerHTML=renderSumulas();}renderSumulasList();}
function renderSumulasList(){
  const box=$('#sumList'); if(!box)return;
  const f=cur.sumFilter; const {repo,fromNb}=sumulasAll();
  let list=[];
  if(f.origem!=='caderno') list=list.concat(repo);
  if(f.origem!=='repo') list=list.concat(fromNb);
  const q=(f.q||'').toLowerCase();
  list=list.filter(t=>{
    if(t._origem==='repo'){
      if(f.orgao&&t.orgao!==f.orgao)return false;
      if(f.status&&t.status!==f.status)return false;
      if(f.ramo&&t.ramo!==f.ramo)return false;
      if(f.node&&!((t.links||[]).includes(f.node)))return false;
    }else{
      if(f.orgao||f.status)return false;
      if(f.ramo&&t.ramo!==f.ramo)return false;
      if(f.node&&t._nodeId!==f.node)return false;
    }
    if(q){const hay=((t.tema||'')+' '+(t.enunciado||'')+' '+(t.ramo||'')+' '+(t.orgao||'')+' '+(t.obs||'')).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  list.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const CAP=300, shown=list.slice(0,CAP);
  box.innerHTML=`<div style="margin:4px 0 10px;font-size:12px;color:var(--ink-soft);font-weight:600">${list.length} súmula(s)${list.length>CAP?' — mostrando '+CAP+'; refine com busca/filtros/subpasta':''}</div>
    <div class="mat-list" style="max-height:none">${shown.length?shown.map(sumulaCard).join(''):`<div class="empty">Nenhuma súmula.<br>Cadastre com “＋ Nova súmula”.</div>`}</div>`;
}
function sumulaCard(t){
  if(t._origem==='caderno'){
    return `<div class="mat"><div class="mh"><span class="typetag t-sumula">Caderno</span><span class="mt">${esc(t.tema||'(sem número)')}</span></div>
      <div class="src">🗂 ${esc(t._nb)} › ${esc(t._path)}</div>
      ${t.enunciado?`<div class="bd">${esc(t.enunciado)}</div>`:''}
      <div class="mfoot"><span class="chip">vinculada no caderno — edite no caderno</span></div></div>`;
  }
  const chips=[t.orgao?`<span class="typetag t-sumula">${esc(t.orgao)}</span>`:'',t.status?`<span class="chip gold">${esc(t.status)}</span>`:''].join(' ');
  const links=(t.links||[]).map(id=>{const fn=findNodeAny(id);return fn?`<span class="chip" style="cursor:pointer" title="Filtrar por esta subpasta" onclick="setSumFilter('node','${id}')">🗂 ${esc(fn.nb.name)} › ${esc(fn.node.name)}</span>`:'';}).join(' ');
  return `<div class="mat"><div class="mh">${chips}<span class="mt">${esc(t.tema||'(sem número)')}</span></div>
    <div class="src">${t.ramo?'📚 '+esc(t.ramo):''}${t.data?' · 📅 '+esc(t.data):''}${t.origem?' · 🏷 '+esc(t.origem):''}</div>
    ${t.enunciado?`<div class="bd">${esc(t.enunciado)}</div>`:''}
    ${t.obs?`<div class="bd" style="font-style:italic;color:var(--ink-soft)">📝 ${esc(t.obs)}</div>`:''}
    ${links?`<div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap">${links}</div>`:''}
