<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Magistratura — Estudos para a Magistratura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Google Identity Services (login do Drive) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- Google API (Drive Picker — anexar arquivos) -->
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
:root{
  --ink:#2b2017;            /* tinta sépia escura */
  --ink-soft:#5c4a38;
  --gold:#b8860b;
  --gold-bright:#d9a92e;
  --burgundy:#7b1e1e;
  --burgundy-deep:#5a1414;
  --parchment:#f4ead6;
  --parchment-2:#efe2c7;
  --line:rgba(123,30,30,.28);
  --glass-bg:rgba(250,244,230,.55);
  --glass-bg-strong:rgba(250,244,230,.78);
  --glass-brd:rgba(255,255,255,.45);
  --glass-shadow:0 10px 34px rgba(60,30,10,.20), inset 0 1px 0 rgba(255,255,255,.55);
  --radius:18px;
  --radius-sm:12px;
  --hero-ink:#fdf4e0;
  --hero-latin:#f0dfb6;
  --hero-sub:#ece0bf;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:'Inter',system-ui,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1200px 700px at 12% -8%, rgba(217,169,46,.20), transparent 55%),
    radial-gradient(1100px 800px at 110% 0%, rgba(123,30,30,.18), transparent 50%),
    radial-gradient(900px 900px at 50% 120%, rgba(50,30,12,.25), transparent 60%),
    linear-gradient(160deg, #3a2a1a 0%, #5a3e22 38%, #6b4a28 60%, #3c2a18 100%);
  background-attachment:fixed;
  min-height:100vh;
  overflow-x:hidden;
}
/* textura/colunas de fundo */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.10;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='220' viewBox='0 0 160 220'><g fill='none' stroke='%23f4ead6' stroke-width='2'><rect x='30' y='20' width='100' height='14'/><rect x='38' y='40' width='84' height='150'/><line x1='52' y1='40' x2='52' y2='190'/><line x1='66' y1='40' x2='66' y2='190'/><line x1='80' y1='40' x2='80' y2='190'/><line x1='94' y1='40' x2='94' y2='190'/><line x1='108' y1='40' x2='108' y2='190'/><rect x='26' y='192' width='108' height='14'/></g></svg>");
  background-size:200px 280px;
}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ---------- LIQUID GLASS ---------- */
.glass{
  background:var(--glass-bg);
  -webkit-backdrop-filter:blur(18px) saturate(150%);
  backdrop-filter:blur(18px) saturate(150%);
  border:1px solid var(--glass-brd);
  box-shadow:var(--glass-shadow);
  border-radius:var(--radius);
}
.glass-strong{background:var(--glass-bg-strong)}

/* ---------- TOP BAR ---------- */
.topbar{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;gap:14px;
  padding:10px 18px;margin:10px;border-radius:16px;
}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.brand .seal{
  width:42px;height:42px;border-radius:50%;display:grid;place-items:center;
  background:radial-gradient(circle at 35% 30%, #f3d27a, var(--gold) 60%, #7a5a06);
  color:#3a2a08;font-size:22px;box-shadow:0 4px 14px rgba(0,0,0,.3), inset 0 1px 3px rgba(255,255,255,.6);
}
.brand h1{font-family:'Cinzel',serif;font-weight:700;font-size:19px;letter-spacing:1.5px;margin:0;color:var(--ink)}
.brand small{display:block;font-family:'EB Garamond',serif;font-style:italic;font-size:11.5px;color:var(--ink-soft);letter-spacing:.5px}
.spacer{flex:1}
.topnav{display:flex;gap:6px}
.topnav button{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.5px}

/* ---------- BOTÕES ---------- */
button{font-family:inherit;cursor:pointer}
.btn{
  border:1px solid var(--glass-brd);
  background:linear-gradient(180deg, rgba(255,255,255,.45), rgba(255,255,255,.12));
  color:var(--ink);padding:8px 14px;border-radius:11px;font-weight:600;font-size:13px;
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  transition:transform .12s ease, box-shadow .2s ease, background .2s;
  box-shadow:0 3px 10px rgba(60,30,10,.14);
}
.btn:hover{transform:translateY(-1px);box-shadow:0 7px 18px rgba(60,30,10,.22)}
.btn:active{transform:translateY(0)}
.btn.gold{background:linear-gradient(180deg,#e7c463,#c9991f);color:#3a2a08;border-color:#e9cf86}
.btn.burg{background:linear-gradient(180deg,#9a2a2a,#6c1414);color:#fbeede;border-color:#b34a4a}
.btn.ghost{background:rgba(255,255,255,.12)}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:9px}
.btn.icon{padding:6px 9px;line-height:1}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.chip{
  display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;
  background:rgba(123,30,30,.10);border:1px solid var(--line);color:var(--burgundy);white-space:nowrap;
}
.chip.gold{background:rgba(184,134,11,.14);border-color:rgba(184,134,11,.35);color:#8a6608}

/* status drive */
.drive-status{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-soft);font-weight:600}
.dot{width:9px;height:9px;border-radius:50%;background:#b9b0a0;box-shadow:0 0 0 3px rgba(255,255,255,.25)}
.dot.on{background:#2e9e4f}
.dot.sync{background:var(--gold-bright);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ---------- HOME ---------- */
.view{flex:1;padding:8px 18px 90px}
.hero{max-width:1080px;margin:14px auto 0;text-align:center;padding:34px 26px}
.hero .seal-lg{
  width:96px;height:96px;border-radius:50%;margin:0 auto 14px;display:grid;place-items:center;font-size:50px;color:#3a2a08;
  background:radial-gradient(circle at 35% 28%, #f6da8b, var(--gold) 62%, #6d4f05);
  box-shadow:0 10px 30px rgba(0,0,0,.35), inset 0 2px 5px rgba(255,255,255,.7);
}
.hero h2{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(28px,4.5vw,46px);margin:.1em 0;letter-spacing:2px;color:var(--hero-ink);text-shadow:0 2px 14px rgba(0,0,0,.4)}
.hero .latin{font-family:'EB Garamond',serif;font-style:italic;font-size:17px;color:var(--hero-latin);letter-spacing:.6px}
.hero .rule{height:2px;width:160px;margin:16px auto;background:linear-gradient(90deg,transparent,var(--gold-bright),transparent)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;max-width:980px;margin:26px auto 0}
.card{
  padding:26px 20px;text-align:center;cursor:pointer;position:relative;overflow:hidden;
  transition:transform .16s ease, box-shadow .25s ease;
}
.card:hover{transform:translateY(-5px) scale(1.012);box-shadow:0 18px 40px rgba(40,20,5,.32)}
.card .ic{font-size:42px;display:block;margin-bottom:10px;filter:drop-shadow(0 3px 5px rgba(0,0,0,.2))}
.card h3{font-family:'Cinzel',serif;font-size:17px;letter-spacing:1px;margin:.2em 0;color:var(--ink)}
.card p{font-family:'EB Garamond',serif;font-size:14px;color:var(--ink-soft);margin:.3em 0 0}
.card .corner{position:absolute;top:10px;right:12px;font-size:11px;color:var(--gold)}
.card::after{content:"";position:absolute;left:-40%;top:-120%;width:60%;height:340%;transform:rotate(18deg);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);transition:left .5s ease}
.card:hover::after{left:130%}

/* ---------- LAYOUT CADERNOS ---------- */
.workspace{display:grid;grid-template-columns:var(--nb-col,236px) var(--tree-col,322px) minmax(0,1fr);gap:14px;max-width:min(2400px,98vw);margin:6px auto 0;align-items:stretch;transition:grid-template-columns .3s ease}
.workspace.tree-collapsed{grid-template-columns:var(--nb-col,236px) 48px minmax(0,1fr)}
.workspace.nb-collapsed{grid-template-columns:48px var(--tree-col,322px) minmax(0,1fr)}
.workspace.nb-collapsed.tree-collapsed{grid-template-columns:48px 48px minmax(0,1fr)}
.workspace.resizing{transition:none;user-select:none}
.col-resizer{position:absolute;top:0;right:-7px;width:12px;height:100%;cursor:col-resize;z-index:8;touch-action:none}
.col-resizer::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:54px;border-radius:3px;background:rgba(123,30,30,.22);transition:.15s}
.col-resizer:hover::after,.workspace.resizing .col-resizer::after{background:var(--gold);height:88px}
.panel{padding:14px;min-height:76vh;position:relative}
.panel.rail{padding:6px 4px;overflow:hidden;min-height:76vh}
.rail-open{writing-mode:vertical-rl;transform:rotate(180deg);height:100%;width:100%;border:none;background:transparent;
  font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;color:var(--burgundy);cursor:pointer;border-radius:10px}
.rail-open:hover{background:rgba(255,255,255,.3)}
.lvldot{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.15)}
.panel h4{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;margin:2px 0 12px;color:var(--burgundy);display:flex;align-items:center;gap:8px}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}

/* sidebar cadernos */
.nb-list{display:flex;flex-direction:column;gap:7px;max-height:74vh;overflow:auto;padding-right:4px}
.nb-item{
  display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:9px 11px;border-radius:12px;cursor:pointer;
  border:1px solid transparent;transition:.15s;background:rgba(255,255,255,.18);position:relative
}
.nb-item:hover{background:rgba(255,255,255,.4)}
.nb-item.active{border-color:var(--gold);background:linear-gradient(180deg,rgba(231,196,99,.5),rgba(231,196,99,.18));box-shadow:inset 0 0 0 1px rgba(184,134,11,.25)}
.nb-swatch{width:13px;height:13px;border-radius:4px;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.15)}
.nb-item .nm{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:var(--nb-font,17px);flex:1;min-width:0;line-height:1.12;word-break:break-word}
.nb-item .ct{font-size:11px;color:var(--ink-soft);font-weight:700;flex:none;background:rgba(0,0,0,.06);padding:1px 8px;border-radius:999px}
.nb-acts{display:none;gap:4px;width:100%;justify-content:flex-end;margin-top:3px}
.nb-item:hover .nb-acts,.nb-item.active .nb-acts{display:flex}

/* organograma */
.tree{font-size:14px;overflow:auto;max-height:74vh;padding:4px 2px 10px}
.tree ul{list-style:none;margin:0;padding-left:26px;position:relative}
.tree > ul{padding-left:4px}
.tree li{position:relative;padding:5px 0}
.tree ul ul li::before{content:"";position:absolute;top:-5px;left:-14px;border-left:2px solid var(--line);height:100%}
.tree ul ul li:last-child::before{height:23px}
.tree ul ul li::after{content:"";position:absolute;top:18px;left:-14px;width:12px;border-top:2px solid var(--line)}
.node{
  display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:10px;cursor:pointer;
  background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.4);transition:.14s;
}
.node:hover{background:rgba(255,255,255,.45)}
.node.sel{border-color:var(--burgundy);background:linear-gradient(180deg,rgba(154,42,42,.18),rgba(154,42,42,.06));box-shadow:0 2px 8px rgba(123,30,30,.18)}
.node .tt{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:var(--tree-font,16px);flex:1;line-height:1.05}
.node .mc{font-size:10px;color:var(--ink-soft);font-weight:700}
.node .acts{display:none;gap:3px}
.node:hover .acts,.node.sel .acts{display:flex}
.mini{border:none;background:rgba(123,30,30,.10);border-radius:7px;padding:3px 6px;font-size:12px;line-height:1}
.mini:hover{background:rgba(123,30,30,.22)}
.empty{font-family:'EB Garamond',serif;font-style:italic;color:var(--ink-soft);text-align:center;padding:26px 10px;font-size:15px}

/* editor pane */
.detail{display:flex;flex-direction:column;min-height:62vh}
.breadcrumb{font-family:'EB Garamond',serif;font-size:13px;color:var(--ink-soft);margin-bottom:6px}
.breadcrumb b{color:var(--burgundy)}
.detail-title{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.detail-title input{
  font-family:'Cinzel',serif;font-weight:600;font-size:18px;color:var(--ink);background:transparent;border:none;border-bottom:2px dashed transparent;flex:1;padding:2px 0
}
.detail-title input:focus{outline:none;border-bottom-color:var(--gold)}

/* tabs */
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.tab{padding:6px 11px;border-radius:9px 9px 0 0;font-size:12px;font-weight:700;border:1px solid transparent;background:rgba(255,255,255,.18);color:var(--ink-soft)}
.tab.active{background:rgba(255,255,255,.55);color:var(--burgundy);border-color:var(--glass-brd);border-bottom-color:transparent}

/* TOOLBAR editor (Word-like) */
.toolbar{display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:7px;border-radius:10px;background:rgba(255,255,255,.4);border:1px solid var(--glass-brd);margin-bottom:8px}
.toolbar select,.toolbar .tbtn{height:30px;border-radius:8px;border:1px solid rgba(0,0,0,.12);background:rgba(255,255,255,.65);font-size:13px;color:var(--ink)}
.toolbar select{padding:0 4px;font-family:inherit}
.tbtn{min-width:30px;padding:0 8px;display:inline-flex;align-items:center;justify-content:center;font-weight:700}
.tbtn:hover{background:#fff}
.tbtn.on{background:var(--gold);color:#3a2a08;border-color:var(--gold)}
.tb-sep{width:1px;height:22px;background:rgba(0,0,0,.14);margin:0 3px}
.tb-pop{position:relative}
.swatches{position:absolute;top:34px;left:0;z-index:30;display:grid;grid-template-columns:repeat(5,22px);gap:5px;padding:9px;border-radius:10px;background:var(--glass-bg-strong);border:1px solid var(--glass-brd);box-shadow:var(--glass-shadow)}
.swatches.hide{display:none}
.sw{width:22px;height:22px;border-radius:5px;cursor:pointer;border:1px solid rgba(0,0,0,.2)}
.sw:hover{transform:scale(1.12)}
.page-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.page-area{overflow:auto;max-height:var(--ed-h,84vh);border:1px solid var(--glass-brd);border-radius:10px;padding:18px 16px;
  background:repeating-linear-gradient(45deg,#d7c8ad,#d7c8ad 11px,#d1c1a4 11px,#d1c1a4 22px)}
.sheet-wrap{width:max-content;margin:0 auto;transform:scale(var(--ed-zoom,1));transform-origin:top center}
.vp-row{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:12.5px}
.vp-row span{flex:1.1;color:var(--ink-soft)}
.vp-row input[type=range]{flex:1.3;min-width:90px}
.vp-row b{width:48px;text-align:right;color:var(--burgundy);font-variant-numeric:tabular-nums}
.ed-resizer{height:16px;cursor:row-resize;display:flex;align-items:center;justify-content:center;margin-top:4px;touch-action:none}
.ed-resizer::after{content:'';width:90px;height:4px;border-radius:3px;background:rgba(123,30,30,.22);transition:.15s}
.ed-resizer:hover::after{background:var(--gold);width:130px}
#pDetail.maximized{position:fixed;inset:12px;z-index:200;min-height:0;background:var(--glass-bg-strong);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-brd);border-radius:14px;box-shadow:var(--glass-shadow);overflow:auto;padding:16px 18px}
#pDetail.maximized .page-area{max-height:calc(100vh - 240px)}
.ed-backdrop{position:fixed;inset:0;background:rgba(20,12,6,.30);z-index:199}
.ruler-h{position:relative;height:22px;background:#f1e8d4;border:1px solid rgba(0,0,0,.18);border-radius:4px;margin:0 auto 8px;user-select:none}
.ruler-h .rk{position:absolute;top:13px;width:1px;height:7px;background:rgba(0,0,0,.5)}
.ruler-h .rk.minor{top:16px;height:4px;background:rgba(0,0,0,.3)}
.ruler-h .rn{position:absolute;top:2px;font-size:8.5px;color:#5b4630;transform:translateX(-50%);font-family:'Inter',sans-serif}
.ruler-h .rmargin{position:absolute;top:0;height:100%;background:rgba(123,30,30,.16)}
.ruler-h .rhandle{position:absolute;top:0;height:100%;width:14px;transform:translateX(-50%);cursor:ew-resize;z-index:3;touch-action:none}
.ruler-h .rhandle::after{content:'';position:absolute;left:50%;top:1px;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:9px solid var(--burgundy)}
.editor-page{background:#fff;box-shadow:0 6px 22px rgba(0,0,0,.32);color:#000;font-family:'EB Garamond',serif;font-size:17px;line-height:1.6;outline:none}
.editor-page:focus{box-shadow:0 6px 22px rgba(0,0,0,.32),0 0 0 2px rgba(184,134,11,.4)}
.editor-page:empty:before{content:attr(data-ph);color:#aaa;font-style:italic}
.editor-page img{max-width:100%}
.editor-page h1,.editor-page h2,.editor-page h3{font-family:'Cinzel',serif}
.editor-page blockquote{border-left:3px solid var(--gold);margin-left:0;padding-left:14px;color:#444;font-style:italic}
.editor-page table.doc-table{border-collapse:collapse;width:100%;margin:10px 0;font-size:15px}
.editor-page table.doc-table td,.editor-page table.doc-table th{border:1px solid #8a7a5c;padding:5px 8px;min-width:28px;vertical-align:top}
.editor-page table.doc-table td:focus{outline:2px solid var(--gold);outline-offset:-2px}
.editor-page img{max-width:100%;height:auto;border-radius:4px}
.toc-panel{margin:0 0 8px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,.55);border:1px solid var(--glass-brd);max-height:190px;overflow:auto}
.toc-panel h5{margin:0 0 6px;font-family:'Cinzel',serif;font-size:12px;color:var(--burgundy);letter-spacing:.5px}
.toc-item{display:block;width:100%;text-align:left;border:none;background:transparent;padding:3px 6px;border-radius:6px;font-family:'EB Garamond',serif;font-size:14.5px;color:var(--ink);cursor:pointer}
.toc-item:hover{background:rgba(184,134,11,.18)}
.toc-l1{font-weight:700}.toc-l2{padding-left:18px}.toc-l3{padding-left:36px;font-size:13.5px}
.toc-empty{font-size:12.5px;color:var(--ink-soft);font-style:italic}
.editor-page :target{background:rgba(184,134,11,.18)}
.save-hint{font-size:11px;color:var(--ink-soft);margin-top:6px;font-style:italic}

/* materiais */
.mat-tools{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px}
.mat-list{display:flex;flex-direction:column;gap:9px;overflow:auto;max-height:54vh;padding-right:4px}
.mat{padding:11px 12px;border-radius:12px;background:rgba(255,255,255,.34);border:1px solid var(--glass-brd)}
.mat .mh{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.mat .mt{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:17px;flex:1}
.mat .src{font-size:11.5px;color:var(--burgundy);font-weight:600}
.mat .bd{font-family:'EB Garamond',serif;font-size:14.5px;color:var(--ink);white-space:pre-wrap;line-height:1.45}
.mat .mfoot{display:flex;gap:6px;justify-content:flex-end;margin-top:6px}
.typetag{font-size:9.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:#fff;padding:2px 7px;border-radius:6px}
.t-doutrina{background:#6b4a28}.t-jurisprudencia{background:#1c4f8b}.t-tese{background:var(--burgundy)}
.t-sumula{background:#8a6608}.t-enunciado{background:#5b2a86}.t-legislacao{background:#1e7b34}.t-arquivo{background:#3d3d46}
.file-prev{width:100%;height:440px;border:1px solid var(--glass-brd);border-radius:10px;margin-top:9px;background:#fff}
.mat .mfoot a.mini{text-decoration:none;color:var(--ink)}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(30,18,8,.55);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:grid;place-items:center;padding:18px}
.overlay.hide{display:none}
.modal{width:min(640px,96vw);max-height:90vh;overflow:auto;padding:22px}
.modal.lg{width:min(860px,96vw)}
.modal h3{font-family:'Cinzel',serif;font-size:18px;letter-spacing:.6px;margin:0 0 4px;color:var(--burgundy);display:flex;align-items:center;gap:9px}
.modal .sub{font-family:'EB Garamond',serif;font-style:italic;color:var(--ink-soft);margin:0 0 16px;font-size:14px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:700;letter-spacing:.3px;color:var(--ink-soft);margin-bottom:5px;text-transform:uppercase}
.field input,.field select,.field textarea{
  width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(0,0,0,.16);background:rgba(255,255,255,.7);
  font-family:inherit;font-size:14px;color:var(--ink)
}
.field textarea{min-height:120px;resize:vertical;font-family:'EB Garamond',serif;font-size:15px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,11,.18)}
.typegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}

.typeopt.sel{border-color:var(--burgundy);background:rgba(154,42,42,.12);color:var(--burgundy)}
.modal-foot{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}
.row{display:flex;gap:10px}
.row>*{flex:1}
.hintbox{font-size:12.5px;background:rgba(184,134,11,.12);border:1px solid rgba(184,134,11,.3);border-radius:10px;padding:10px 12px;color:#6b5008;line-height:1.5}
.hintbox code{background:rgba(0,0,0,.08);padding:1px 5px;border-radius:4px;font-size:12px}
.hintbox a{color:var(--burgundy);font-weight:600}
.setup-guide summary{cursor:pointer;font-weight:700;font-size:13px;color:var(--burgundy);padding:8px 10px;border:1px solid var(--line);border-radius:10px;list-style:none}
.setup-guide summary:hover{background:rgba(123,30,30,.08)}
.setup-guide[open] summary{border-bottom-left-radius:0;border-bottom-right-radius:0}

/* floating quick-add */
.fab{position:fixed;right:22px;bottom:22px;z-index:60;width:62px;height:62px;border-radius:50%;border:none;
  background:radial-gradient(circle at 35% 30%, #f3d27a, var(--gold) 60%, #7a5a06);color:#3a2a08;font-size:30px;
  box-shadow:0 8px 24px rgba(0,0,0,.4), inset 0 1px 3px rgba(255,255,255,.6);transition:transform .15s}
.fab:hover{transform:scale(1.08) rotate(90deg)}
.fab-lbl{position:fixed;right:96px;bottom:38px;z-index:60;font-family:'Cinzel',serif;font-size:12px;color:#fdf4e0;background:rgba(40,20,8,.6);padding:6px 12px;border-radius:999px;pointer-events:none;opacity:.9}

/* IA chat */
.ai-wrap{display:flex;flex-direction:column;height:72vh}
.ai-scope{font-size:12px;color:var(--ink-soft);margin-bottom:8px}
.ai-msgs{flex:1;overflow:auto;display:flex;flex-direction:column;gap:12px;padding:6px 2px}
.msg{max-width:88%;padding:11px 14px;border-radius:14px;font-family:'EB Garamond',serif;font-size:15.5px;line-height:1.5;white-space:pre-wrap}
.msg.u{align-self:flex-end;background:linear-gradient(180deg,#9a2a2a,#6c1414);color:#fbeede;border-bottom-right-radius:4px}
.msg.a{align-self:flex-start;background:rgba(255,255,255,.55);border:1px solid var(--glass-brd);border-bottom-left-radius:4px}
.msg .srcs{margin-top:8px;font-size:12px;font-family:'Inter';color:var(--ink-soft)}
.msg .srcs a{color:var(--burgundy)}
.ai-input{display:flex;gap:8px;margin-top:10px}
.ai-input textarea{flex:1;min-height:46px;max-height:120px;padding:11px;border-radius:12px;border:1px solid rgba(0,0,0,.16);background:rgba(255,255,255,.7);font-family:inherit;font-size:14px;resize:none}
.typing{font-style:italic;color:var(--ink-soft);font-family:'EB Garamond',serif}

/* toast */
.toasts{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{padding:10px 16px;border-radius:12px;font-size:13px;font-weight:600;color:#fdf4e0;background:rgba(40,24,10,.9);box-shadow:0 6px 20px rgba(0,0,0,.35);animation:rise .3s ease}
.toast.ok{background:rgba(30,123,52,.95)}.toast.err{background:rgba(154,42,42,.95)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.pv-card{padding:14px 16px;border-radius:14px;background:rgba(255,255,255,.28);border:1px solid var(--glass-brd);transition:.15s;margin-bottom:10px}

.pvbar>i{display:block;height:100%;border-radius:5px;background:var(--gold);transition:width .4s}
.pv-disc{padding:11px 12px;border-radius:11px;background:rgba(255,255,255,.32);border:1px solid var(--glass-brd);margin-bottom:8px}

.pv-disc.ok{opacity:.72}

.pv-cal-wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px}
.pv-cal h5{font-family:'Cinzel',serif;text-align:center;font-size:12px;color:var(--burgundy);margin:0 0 7px;letter-spacing:1px}
.pv-cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.pv-wd{text-align:center;font-size:9px;font-weight:800;color:var(--ink-soft);opacity:.6}
.pv-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:6px;cursor:pointer;background:rgba(255,255,255,.42);border:1px solid transparent;user-select:none}
.pv-d:hover{border-color:var(--gold)}
.pv-d.studied{background:#1e7b34;color:#fff}
.pv-d.missed{background:#c0392b;color:#fff}
.pv-d.exam{background:var(--gold);color:#3a2a08;font-weight:800;box-shadow:0 0 0 2px var(--burgundy)}
.pv-d.out{opacity:.22;cursor:default}
.pv-d.tdy{outline:2px solid var(--burgundy);outline-offset:-2px}
.pv-heat{display:flex;flex-wrap:wrap;gap:3px}
.pv-hc{width:13px;height:13px;border-radius:3px}
.pv-topic{display:flex;gap:8px;align-items:flex-start;padding:4px 2px;font-size:13.5px;font-family:'EB Garamond',serif}
.pv-topic input{margin-top:4px;flex:none}
.pv-topic.done label{text-decoration:line-through;opacity:.55}
.pom-ring{transform:rotate(-90deg)}
.pom-ring .bgc{fill:none;stroke:rgba(0,0,0,.12);stroke-width:9}
.pom-ring .fgc{fill:none;stroke:var(--gold);stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset .4s}
/* ---- busca geral (home) ---- */
.gs-box{max-width:820px;margin:22px auto 10px;padding:18px 20px}
.gs-item{padding:9px 12px;border-radius:10px;background:rgba(255,255,255,.32);border:1px solid var(--glass-brd);margin-bottom:7px;cursor:pointer;transition:.12s}
.gs-item:hover{background:rgba(255,255,255,.55);transform:translateY(-1px)}
.gs-where{font-size:11.5px;color:var(--ink-soft)}
.gs-snip{font-family:'EB Garamond',serif;font-size:14.5px;margin-top:3px;color:var(--ink);line-height:1.45}
.gs-snip mark{background:rgba(184,134,11,.4);color:inherit;border-radius:3px;padding:0 2px}
#globalResults{max-height:55vh;overflow:auto;margin-top:6px}

@media(max-width:1100px){.workspace{grid-template-columns:1fr}.panel{min-height:auto}.detail{min-height:auto}}

/* ---------- TEMAS (cores e plano de fundo) ---------- */

    bg:'radial-gradient(1200px 700px at 12% -8%, rgba(217,169,46,.20), transparent 55%),radial-gradient(1100px 800px at 110% 0%, rgba(123,30,30,.18), transparent 50%),radial-gradient(900px 900px at 50% 120%, rgba(50,30,12,.25), transparent 60%),linear-gradient(160deg,#3a2a1a 0%,#5a3e22 38%,#6b4a28 60%,#3c2a18 100%)'},

/* ============================================================

"c": "Lei Geral de Proteção de Dados."}]}, {"nome": "Direito Civil", "itens": [{"o": "TJSC", "n": "1", "t": "Lei de Introdução às Normas do Direito Brasileiro", "c": "Lei de Introdução às Normas do Direito Brasileiro."}, {"o": "TJSC", "n": "2", "t": "Sistema do Código Civil", "c": "Sistema do Código Civil. Princípios gerais do Direito. Unidade sistemática e pluralidade de fontes. Codificação e constitucionalização das relações interprivadas."}, {"o": "TJSC", "n": "3", "t": "Direito subjetivo", "c": "Direito subjetivo. Direito potestativo. Faculdade jurídica. Direitos imprescritíveis. Relação jurídica e situações jurídicas. Situações subjetivas existenciais e situações subjetivas patrimoniais."}, {"o": "TJSC", "n": "4", "t": "Das pessoas naturais", "c": "Das pessoas naturais. Da personalidade e da capacidade. Dos direitos de personalidade. Da ausência. Da personalidade jurídica. Liberdade, autonomia e novas tecnologias. Teorias da desconsideração da personalidade jurídica. Do domicílio."}, {"o": "TJSC", "n": "5", "t": "Dos Bens", "c": "Dos Bens. Bens considerados em si mesmos. Móveis e imóveis. Fungíveis e consumíveis. Divisíveis. Singulares e coletivos. Bens reciprocamente considerados. Principais e acessórios. Benfeitorias e sua classificação. Bens públicos. Distinção dos particulares."}, {"o": "TJSC", "n": "6", "t": "Dos Fatos jurídicos", "c": "Dos Fatos jurídicos. Teoria Geral do negócio jurídico. Prova. Negócios jurídicos: conceito, pressupostos e elementos de existência, requisitos de validade; classificações. Inexistência, invalidade e ineficácia. Interpretação dos atos e negócios jurídicos. Defeitos dos atos e negócios jurídicos. Erro. Dolo. Coação. Estado de perigo. Lesão. Fraude contra credores. Invalidade do negócio jurídico. Negócio nulo. Condições de nulidade. Simulação. Negócio anulável. Condições de anulabilidade. Convalidação. Requisitos. Prova dos fatos jurídicos. Interesse público e estrutura do negócio jurídico. A função negocial nas relações jurídicas contemporâneas. “Lei da Usura” (Decreto nº 22.626/1933)."}, {"o": "TJSC", "n": "7", "t": "Dos atos jurídicos lícitos e dos atos jurídicos ilícitos", "c": "Dos atos jurídicos lícitos e dos atos jurídicos ilícitos. Requisitos de configuração do ato ilícito. Excludentes do ato ilícito."}, {"o": "TJSC", "n": "8", "t": "Prescrição e decadência", "c": "Prescrição e decadência. Regime jurídico do Código Civil. Disposições gerais. Prescrição. Exceção, renúncia, oportunidade de alegação, reconhecimento ex officio e iniciativa do interessado. Interrupção e suspensão da prescrição. Fato com origem criminal. Termo legal da prescrição. Solidariedade. Aproveitamento da prescrição. Condições. Prazos de prescrição. Decadência. Legal e convencional. Renúncia. Prazos de decadência."}, {"o": "TJSC", "n": "9", "t": "Das Obrigações", "c": "Das Obrigações. Modalidades. Obrigações de dar. Obrigações de fazer e não fazer. Obrigações alternativas, divisíveis e indivisíveis. Obrigações solidárias. Solidariedade ativa e passiva. Transmissão das obrigações. Adimplemento, inadimplemento e extinção das obrigações. Mora."}, {"o": "TJSC", "n": "10", "t": "Contratos em geral", "c": "Contratos em geral. Normas gerais. Extinção do contrato. Tendências atuais do direito contratual. Autonomia da vontade. Intervenção do Estado e a função social do contrato. Contrato e propriedade. Pós-eficácia contratual. Lei de Liberdade Econômica (Lei nº 13.874/2019)."}, {"o": "TJSC", "n": "11", "t": "Formação dos contratos, estipulação em favor de terceiro, promessa de fato de terc…", "c": "Formação dos contratos, estipulação em favor de terceiro, promessa de fato de terceiro, vícios redibitórios, evicção, contratos aleatórios, contrato preliminar, contrato com pessoa a declarar. Teoria da boa-fé objetiva. Extinção do contrato. Distrato. Cláusula resolutiva. Exceção do contrato não cumprido. Revisão contratual. Teorias subjetivas e objetivas. Imprevisão. Resolução por onerosidade excessiva. Teoria da base do negócio jurídico."}, {"o": "TJSC", "n": "12", "t": "Classificação dos contratos:", "c": "Classificação dos contratos: unilaterais e bilaterais; típicos, atípicos e mistos; consensuais e reais; gratuitos e onerosos; cumulativos e aleatórios; contratos solenes e não solenes; contratos personalíssimos; contratos preliminares. Contrato com pessoa a nomear. Gestão de negócios. Distinções e semelhanças do regime jurídico-contratual entre ‘civil law’ e ‘common law’."}, {"o": "TJSC", "n": "13", "t": "Contratos em espécie (típicos):", "c": "Contratos em espécie (típicos): Compra e venda. Troca ou permuta. Contrato estimatório. Doação. Locação de coisas. Fiança. Empréstimo. Comodato. Mútuo. Prestação de serviço. Empreitada. Depósito. Mandato. Comissão. Agência e Distribuição. Corretagem. Transporte. Seguro. Constituição de renda. Transação. Contratos atípicos. Contratos agrários. Parceria e arrendamento."}, {"o": "TJSC", "n": "14", "t": "Atos Unilaterais", "c": "Atos Unilaterais. Promessa de recompensa. Gestão de negócios. Pagamento indevido. Enriquecimento sem causa."}, {"o": "TJSC", "n": "15", "t": "Da responsabilidade civil e da obrigação de indenizar", "c": "Da responsabilidade civil e da obrigação de indenizar. Do novo direito de danos e os reflexos na imputação e no nexo causal."}, {"o": "TJSC", "n": "16", "t": "Da posse", "c": "Da posse. Conceito e classificação. Detenção. Aquisição. Efeitos e perda. Composse e defesa dos direitos possessórios. Posse justa, violenta, clandestina e precária. Posse de boa-fé. Constituto possessório. Aquisição, efeitos, desforço próprio. Direitos do possuidor de boa-fé. Obrigações e direitos do possuidor de má-fé. Exceptio proprietatis. Perda da posse."}, {"o": "TJSC", "n": "17", "t": "Da propriedade", "c": "Da propriedade. Função social da propriedade. Aquisição da propriedade imóvel. Modos de aquisição a título originário e derivado. Aquisição da propriedade móvel. Tradição. Perda da propriedade. Direitos de vizinhança. Superfície. Servidões. Usufruto. Uso e Habitação. Direito do promitente comprador. Penhor. Hipoteca. Anticrese. Alienação fiduciária. Proteção possessória. Usucapião. Espécies e requisitos."}, {"o": "TJSC", "n": "18", "t": "Direito das famílias", "c": "Direito das famílias. Direitos pessoais. Casamento. Formas, pressupostos, capacidade, impedimentos, causas suspensivas, celebração, provas, nulidade, anulabilidade e eficácia. Dissolução do casamento. Dissolução da sociedade conjugal e do vínculo matrimonial. Formas, causas, hipóteses de impossibilidade de vida em comum. Separação, divórcio e proteção da pessoa dos filhos. Direito Parental. Relação de parentesco, filiação, reconhecimento dos filhos, adoção, poder familiar e bem de família. Investigação de paternidade. Fundamentos biologistas e bases socioafetivas da filiação e do parentesco. Filiação matrimonial. Filiação havida fora do casamento. Posse de estado de filho. Filiação e descendência genética. Guarda compartilhada (Lei nº 13.058/2014). Direito Protetivo. Tutela e Curatela. Medidas protetivas à violência doméstica e familiar (Lei nº 11.340/2006)."}, {"o": "TJSC", "n": "19", "t": "Direito das famílias", "c": "Direito das famílias. Direitos pessoais. Da União Estável e do Concubinato. União estável. Conceito, condições, impedimentos, deveres, causas suspensivas do casamento e a união estável, regime patrimonial. Concubinato. Conceito e reconhecimento judicial. Da União Homoafetiva."}, {"o": "TJSC", "n": "20", "t": "Direito das Família", "c": "Direito das Família. Direitos patrimoniais. Regimes de bens no casamento, usufruto e administração dos bens dos filhos menores. Alimentos. Conceito, abrangência, finalidade, pressupostos, critérios e características da obrigação. Bem de família."}, {"o": "TJSC", "n": "21", "t": "Do Direito das Sucessões", "c": "Do Direito das Sucessões. Da sucessão em geral. Herança e administração. Vocação hereditária. Aceitação e renúncia. Exclusão da sucessão. Herança jacente. Petição de herança. Sucessão legítima. Ordem de vocação hereditária. Herdeiros necessários. Direito de representação. Sucessão testamentária. Testamento em geral. Capacidade de testar. Testamentos público, cerrado e particular. Codicilo. Legados e sua caducidade. Testamentos especiais. Direito de acrescer entre herdeiros e legatários. Substituições. Deserdação. Redução das disposições testamentárias. Revogação e rompimento do testamento. Inventário e partilha. Sonegados. Pagamento de dívidas. Colação de bens. Garantia dos quinhões hereditários. Anulação de partilha. Das disposições finais e transitórias do Código Civil Brasileiro, artigos 2.028 a 2.046."}, {"o": "TJSC", "n": "22", "t": "Registros Públicos", "c": "Registros Públicos. Lei nº 6.015, de 31 de dezembro de 1973 (Provimento nº 149/2023 do Conselho Nacional de Justiça). Natureza dos serviços. Delegação. Fé pública. Lei nº 8.935/94. Registro de imóveis. Princípios de regência do registro imobiliário. Atos sujeitos a registro. Averbações. Registro de Títulos e Documentos. Atos sujeitos a registro. Sociedades religiosas e partidos políticos. Competência para registro dos atos constitutivos e estatutos. Registro Civil das Pessoas Naturais. Atos sujeitos a registro. Tabelionatos de Notas e Tabelionatos de Protestos Cambiais. Competência dos titulares."}, {"o": "TJSC", "n": "23", "t": "Da alienação fiduciária (Decreto-Lei nº 911, de 1º de outubro de 1969)", "c": "Da alienação fiduciária (Decreto-Lei nº 911, de 1º de outubro de 1969). Lei nº 9.514, de 20 de novembro de 1997. Do condomínio em edificações e as incorporações imobiliárias (Lei nº 4.591, de 16 de dezembro de 1964), Lei nº 10.931, de 2 de agosto de 2004. Do Estatuto do Idoso (Lei nº 10.741, de 1º de outubro de 2003). Da locação de imóveis urbanos (Lei nº 8.245, de 18 de outubro de 1991). Estatuto da Pessoa com Deficiência (Lei nº 13.146/2015). Lei nº 14.382/2022. Regime Jurídico Emergencial e Transitório das relações jurídicas de Direito Privado (Lei nº 14.010/2020). Resolução CNJ nº 452, de 22/4/2022. Lei Geral de Proteção de Dados Pessoais (Lei nº 13.709/2018). Marco Civil da Internet (Lei nº 12.965/2014). Lei Federal de Parcelamento do Solo Urbano nº 6.766/1979. Lei Estadual nº 17.492/2018."}, {"o": "TRF6", "n": "1", "t": "Lei de Introdução às normas do Direito Brasileiro", "c": "Lei de Introdução às normas do Direito Brasileiro. Pessoas naturais. Personalidade jurídica. Sistema das incapacidades. Legitimação. Domicílio. Direitos da personalidade. Extinção da personalidade. Morte e morte presumida. Ausência. Tutela. Curatela. Estatuto da pessoa com deficiência."}, {"o": "TRF6", "n": "2", "t": "Pessoas jurídicas", "c": "Pessoas jurídicas. Personalidade jurídica da pessoa jurídica. Desconsideração. Classificação. Início e fim da personalidade jurídica da pessoa jurídica. Administração. Classificação: pessoas jurídicas de direito público e privado. Sociedades, associações e fundações. Partidos políticos (aspectos civis). Entidades sem personificação jurídica e novos sujeitos de direito."}, {"o": "TRF6", "n": "3", "t": "Bens", "c": "Bens. Classificação. Regime jurídico."}, {"o": "TRF6", "n": "4", "t": "Negócios jurídicos", "c": "Negócios jurídicos. Conceito. Existência, validade e eficácia. Condição, termo e encargo. Defeitos do negócio jurídico. Simulação. Atos jurídicos lícitos e ilícitos. Abuso de direito. Representação."}, {"o": "TRF6", "n": "5", "t": "Prescrição e decadência", "c": "Prescrição e decadência. Prescrição e Fazenda Pública. Prova."}, {"o": "TRF6", "n": "6", "t": "Obrigações", "c": "Obrigações. Conceito e modalidades. Obrigação natural. Obrigação propter rem. Transmissão das obrigações. Adimplemento e inadimplemento absoluto e relativo. Modalidades de pagamento. Violação positiva do contrato e cumprimento defeituoso. Juros e correção monetária. Cláusula penal. Preferências e privilégios creditórios."}, {"o": "TRF6", "n": "7", "t": "Contratos em geral:", "c": "Contratos em geral: teoria geral dos contratos. Princípios. Elementos constitutivos. Pressupostos de validade. Revisão dos contratos e suas modalidades."}, {"o": "TRF6", "n": "8", "t": "Contratos em espécie e atos unilaterais", "c": "Contratos em espécie e atos unilaterais. Compra e venda. Permuta. Contrato Estimatório. Doação. Locação. Empréstimo. Prestação de serviço. Depósito. Mandato. Transporte. Seguro. Constituição de renda. Jogo e aposta. Fiança. Alienação fiduciária em garantia. Promessa de recompensa. Gestão de negócios. Pagamento indevido. Enriquecimento sem causa. Contratos no âmbito do Sistema Financeiro da Habitação e do Sistema de Financiamento Imobiliário."}, {"o": "TRF6", "n": "9", "t": "Responsabilidade civil", "c": "Responsabilidade civil. Responsabilidade civil subjetiva e objetiva. Dano moral e material. Nexo causal. Indenização. Responsabilidade por fato de outrem. Responsabilidade por fato da coisa. Responsabilidade civil e criminal. Indenização."}, {"o": "TRF6", "n": "10", "t": "Direitos reais", "c": "Direitos reais. Posse. Definição. Classificação. Aquisição e perda da posse. Efeitos da posse. Composse. Proteção possessória. Propriedade. Função social da propriedade. Definição. Elementos. Classificação. Aquisição e perda. A propriedade privada na Constituição Federal. A propriedade urbana e rural. Estatuto da terra e Estatuto das Cidades. Política agrícola e reforma agrária. Parcelamento do solo. Extensão horizontal e vertical da propriedade. Restrições à propriedade. As diversas modalidades de usucapião. Propriedade resolúvel e fiduciária. Condomínio. Patrimônio de afetação. Superfície. Servidões. Usufruto. Uso. Habitação. Penhor. Hipoteca. Propriedade fiduciária. Registros públicos."}, {"o": "TRF6", "n": "11", "t": "Estatuto da Criança e do Adolescente", "c": "Estatuto da Criança e do Adolescente. Estatuto da Juventude Estatuto do Idoso."}]}, {"nome": "Direito Processual Civil", "itens": [{"o": "TJSC", "n": "1", "t": "Direito material e direito processual", "c": "Direito material e direito processual. Normas processuais fundamentais. Boa-fé, eficiência e colaboração processual. Direito processual e Constituição. Acesso à Justiça. Lesão e ameaça a direito. Instrumentalidade, efetividade, adequação, tempestividade e eficiência da tutela jurisdicional. Princípio de economia processual. Garantia da duração razoável do processo. Meios adequados de resolução de conflitos. Conciliação e mediação. Arbitragem. Aplicação das normas processuais."}, {"o": "TJSC", "n": "2", "t": "Jurisdição e competência", "c": "Jurisdição e competência. Conceito. Características. Espécies. Escopos. Critérios. Limites. Princípios. Cooperação internacional. Incompetência absoluta e relativa e meios de suscitação. Modificação da competência. Prevenção. Prorrogação. Perpetuação. Cooperação nacional. Atos de concertação. Produção de prova única nos litígios de massa."}, {"o": "TJSC", "n": "3", "t": "Ação:", "c": "Ação: conceito, natureza jurídica, teorias, condições, identificação e Classificação. Processo: conceito, natureza jurídica, teorias. Pressupostos processuais."}, {"o": "TJSC", "n": "4", "t": "Sujeitos do processo", "c": "Sujeitos do processo. Partes e capacidade processual. Deveres processuais e responsabilidade. Litigância de má-fé e atos atentatórios à dignidade da justiça. Despesas processuais, honorários de sucumbência, multas e gratuidade da justiça. Sucessão e substituição. Curador especial. Procuradores. Litisconsórcio: modalidades, poderes e limitação. Intervenção de terceiros: espécies, características. Assistência simples e litisconsorcial. Denunciação da lide. Chamamento ao processo. Incidente de desconsideração da personalidade jurídica. Amicus Curiae. Juiz: poderes, deveres e responsabilidades. Impedimento e suspeição. Auxiliares da Justiça. Carreiras essenciais à administração da Justiça. Ministério Público. Advocacia Pública. Defensoria Pública."}, {"o": "TJSC", "n": "5", "t": "Atos processuais:", "c": "Atos processuais: conceito, classificação, forma. Negócio jurídico processual e convenção processual. Calendário processual. Prática de atos processuais no processo eletrônico. Atos das partes. Preclusão temporal, lógica e consumativa. Atos do juiz. Preclusão pro judicato. Tempo, lugar e comunicação dos atos processuais. Prazos. Citações e intimações. Teoria da aparência. Citação real e ficta. Contumácia. Invalidades processuais. Mera irregularidade. Anulabilidade. Nulidade. Vícios processuais sanáveis e insanáveis. Distribuição e registro. Valor da causa."}, {"o": "TJSC", "n": "6", "t": "Tutelas provisórias", "c": "Tutelas provisórias. Aspectos gerais. Poder geral de tutela. Tutelas de urgência. Tutela cautelar e tutela antecipada: cabimento, fungibilidade, momento, requisitos, procedimentalização. Estabilização da tutela antecipada requerida em caráter antecedente. Modalidades de tutela urgente antecipada na forma específica: tutela inibitória e tutela de remoção do ilícito. Tutela de evidência: cabimento, requisitos, procedimentalização. Distribuição do tempo do processo."}, {"o": "TJSC", "n": "7", "t": "Procedimento comum", "c": "Procedimento comum. Formação, suspensão e extinção do Processo. Elementos da demanda. Petição inicial: requisitos, alteração, aditamento, emenda, inépcia e indeferimento. Improcedência liminar do pedido. Recursos. Retratação. Teoria da aparência. Audiência de conciliação ou de mediação."}, {"o": "TJSC", "n": "8", "t": "Resposta:", "c": "Resposta: conceito, espécies. Contestação. Reconvenção. Revelia. Providências preliminares. Julgamento conforme o estado do processo. Extinção do processo. Julgamento antecipado do mérito. Julgamento antecipado parcial do mérito. Saneamento e organização do processo. Delimitação das questões e requerimento de esclarecimentos. Saneamento compartilhado."}, {"o": "TJSC", "n": "9", "t": "Provas:", "c": "Provas: conceito e disposições gerais. Relevância e admissibilidade. Prova direta e indireta. Presunções e máximas de experiência. Ônus e dever probatório. Distribuição estática e distribuição dinâmica. Inversão. Poderes probatórios do juiz. Prova ilícita. Regras de exclusão e regras de privilégio. Provas típicas e atípicas. Prova estatística nas demandas coletivas. Prova e tutela inibitória. Produção da prova e produção antecipada da prova. Valoração da prova. Sistema do convencimento motivado. Standards de prova. Audiência de instrução e julgamento."}, {"o": "TJSC", "n": "10", "t": "Sentença:", "c": "Sentença: conceito, disposições gerais, classificação e elementos. Racionalidade. Fundamentação analítica. Interpretação e argumentação jurídica na sentença. Justificação das consequências da decisão judicial (LINDB). Interpretação da decisão judicial. Efeitos. Regra da congruência. Julgamento das ações relativas às prestações de fazer, de não fazer e de entregar coisa e as formas de tutela específica. Remessa obrigatória. Coisa julgada: conceito; espécies; limites; eficácias negativa, positiva e preclusiva; relativização. O deduzido e o dedutível. Coisa julgada sobre questão. Sentenças autossuficientes e sentenças não autossuficientes. Liquidação de sentença."}, {"o": "TJSC", "n": "11", "t": "Cumprimento de Sentença:", "c": "Cumprimento de Sentença: disposições gerais. Cumprimento de sentença que reconheça a exigibilidade de obrigação: (a) de pagar quantia certa; (b) de prestar alimentos, provisórios ou definitivos; (c) de pagar quantia certa pela Fazenda Pública; (d) de fazer, de não fazer e de entregar coisa. Defesa. Cumprimento de sentença provisório e definitivo."}, {"o": "TJSC", "n": "12", "t": "Procedimentos especiais do CPC/15:", "c": "Procedimentos especiais do CPC/15: ação de consignação em pagamento, ação de exigir contas, ações possessórias, inventário e partilha, ações de família, embargos de terceiro, oposição, habilitação, ação monitória, da homologação do penhor legal; da regulação de avaria grossa; restauração de autos."}, {"o": "TJSC", "n": "13", "t": "Procedimentos de jurisdição voluntária:", "c": "Procedimentos de jurisdição voluntária: disposições gerais. Notificação e interpelação, alienação judicial. Divórcio e separação consensuais, extinção consensual de união estável e alteração do regime de bens do matrimônio. Testamentos e codicilos. Herança jacente. Bens dos ausentes. Coisas vagas. Interdição e tutela. Organização e fiscalização das fundações."}, {"o": "TJSC", "n": "14", "t": "Processo de execução:", "c": "Processo de execução: disposições gerais, partes, competência, requisitos. Títulos executivos. Responsabilidade patrimonial. Espécies de execução. Execução para entrega de coisa. Execução das obrigações de fazer e não fazer. Execução por quantia certa. Execução contra a fazenda pública. Execução de alimentos. Embargos à execução. Suspensão e extinção do processo de execução."}, {"o": "TJSC", "n": "15", "t": "Da ordem dos processos nos Tribunais e competência originária:", "c": "Da ordem dos processos nos Tribunais e competência originária: disposições gerais. Incidentes de assunção de competência, de arguição de inconstitucionalidade e de resolução de demandas repetitivas. Conflito de competência. Homologação de sentença estrangeira e concessão de exequatur a carta rogatória. Ação rescisória. Incidente de resolução de demandas repetitivas. Reclamação."}, {"o": "TJSC", "n": "16", "t": "Recursos:", "c": "Recursos: conceito, natureza jurídica, classificação, normas fundamentais, efeitos. Juízo de admissibilidade e juízo de mérito. Sucedâneos recursais. Ações autônomas de impugnação. Precedentes (ratio decidendi, obiter dictum, formação, vinculação, distinção e superação). Distinguishing e overruling. Recomendação nº 134 do Conselho Nacional de Justiça. Súmulas. Súmulas vinculantes. Papel das Cortes Superiores. Recursos em espécie: apelação, agravo de instrumento, embargos de declaração, agravo interno, recurso ordinário, recurso especial, recurso extraordinário. Repercussão geral em recurso extraordinário. Recursos extraordinário e especial repetitivos e seu julgamento. Agravo em recurso especial e em recurso extraordinário. Embargos de divergência. Técnica de julgamento não unânime."}, {"o": "TJSC", "n": "17", "t": "Código de Processo Civil (Lei nº 13.105/2015 e suas alterações)", "c": "Código de Processo Civil (Lei nº 13.105/2015 e suas alterações). Procedimentos especiais previstos na legislação extravagante. Doutrina processual e legislação processual esparsa e suas alterações (independentemente de indicação específica do diploma legal, mas notadamente a respeito do indicado) sobre: bem de família (Lei nº 8.009/1990 e suas alterações); prescrição das ações contra a Fazenda Pública (Decreto nº 20.910/1932 e Decreto-lei nº 4.597/1942); assistência judiciária (Lei nº 1.060/1950 e suas alterações); execução fiscal (Lei nº 6.830/1980 e suas alterações); divórcio, separação e união estável (Lei nº 6.515/1977 e suas alterações e Lei nº 9.278/1996); proteção do consumidor (Lei nº 8.078/1990) e suas alterações; desapropriação (Decreto-Lei nº 3.365/1941 e suas alterações); registros públicos (Lei nº 6.015/1973 e suas alterações, Provimento nº 149/2023 do Conselho Nacional de Justiça; mandado de segurança (Lei nº 12.016/2009); ação popular e ação civil pública (Lei nº 4.717/1965 e suas alterações, Lei nº 7.347/1985 e suas alterações e Lei nº 8.429/1992 e suas alterações); habeas data (Lei nº 9.507/1997); alimentos (Lei nº 5.478/1968 e suas alterações e Lei nº 11.804/2008); investigação de paternidade (Lei nº 8.560/1992 e suas alterações); habeas corpus cível; usucapião; Juizados Especiais Estadual e Federal (Lei nº 9.099/1995 e suas alterações e Lei nº 10.259/2001 e suas alterações) e Juizado Especial da Fazenda Pública (Lei nº 12.153/2009); informatização do processo judicial (Lei nº 11.419/2006); medidas cautelares e tutela antecipada contra o Poder Público/Fazenda Pública e suspensão de liminares (Lei nº 8.437/1992 e suas alterações e Lei nº 9.494/1997 e suas alterações); edição, revisão e cancelamento de enunciado de súmula vinculante pelo Supremo Tribunal Federal (Lei nº 11.417/2006); mediação e autocomposição de conflitos (Lei nº 13.140/2015). Reflexos da Lei nº 13.105/2015 e suas alterações na legislação processual esparsa. Lei de Introdução às Normas do Direito Brasileiro (Lei nº 13.655/2018). Lei de Arbitragem (Lei nº 9.307/1996 e alterações – Lei nº 13.129/2015). Lei nº 14.538/2023."}, {"o": "TRF6", "n": "1", "t": "Das normas processuais civis e sua aplicação", "c": "Das normas processuais civis e sua aplicação. Os princípios informadores do processo civil."}, {"o": "TRF6", "n": "2", "t": "Da jurisdição", "c": "Da jurisdição. Ação (conceito, natureza jurídica, classificação). Limites da jurisdição nacional e cooperação internacional. Da organização do Judiciário. Meios adequados de resolução de conflitos. Arbitragem e mediação."}, {"o": "TRF6", "n": "3", "t": "Da competência (disposições gerais, modificação da competência e da incompetência)", "c": "Da competência (disposições gerais, modificação da competência e da incompetência). Da cooperação nacional. Da competência da justiça federal."}, {"o": "TRF6", "n": "4", "t": "Dos sujeitos do processo", "c": "Dos sujeitos do processo. Das partes e dos seus procuradores. Do litisconsórcio. Da intervenção de terceiros. Do juiz e dos auxiliares da justiça. Do Ministério Público, da Advocacia Pública e da Defensoria Pública."}, {"o": "TRF6", "n": "5", "t": "Dos atos processuais", "c": "Dos atos processuais. Da forma, do tempo e do lugar dos atos processuais. Da comunicação dos atos processuais. Das nulidades. Da distribuição e do registro."}, {"o": "TRF6", "n": "6", "t": "Da tutela provisória", "c": "Da tutela provisória. Tutelas de urgência e da evidência."}, {"o": "TRF6", "n": "7", "t": "Da formação, da suspensão e da extinção do processo", "c": "Da formação, da suspensão e da extinção do processo."}, {"o": "TRF6", "n": "8", "t": "Do processo de conhecimento", "c": "Do processo de conhecimento. Do procedimento comum. Disposições gerais. Petição inicial. Da improcedência liminar do pedido. Da audiência de conciliação e mediação. Da contestação e da reconvenção. Da revelia e do julgamento conforme o estado do processo. Da audiência de instrução e julgamento. Das provas. Da sentença e da coisa julgada."}, {"o": "TRF6", "n": "9", "t": "Do cumprimento de sentença", "c": "Do cumprimento de sentença. Cumprimento provisório. Cumprimento definitivo de sentença (obrigação de pagar quantia certa, obrigação de fazer, não fazer e de entregar coisa). Cumprimento de sentença e a fazenda pública. Impugnação. A inexigibilidade das sentenças judiciais."}, {"o": "TRF6", "n": "10", "t": "Dos procedimentos especiais", "c": "Dos procedimentos especiais. Ação de consignação em pagamento. Ação de exigir contas. Ações possessórias. Ação de divisão e da demarcação de terras particulares. Ação discriminatória. Embargos de terceiro. Ações de direito de família de competência da Justiça Federal. Oposição. Habilitação. Ação Monitória. Homologação do penhor legal. Restauração de autos. Procedimentos especiais de jurisdição voluntária. Notificação e interpelação. Alienação judicial."}, {"o": "TRF6", "n": "11", "t": "Do processo de execução", "c": "Do processo de execução. Da execução em geral. Das diversas espécies de execução. Da execução para entrega de coisa. Da execução das obrigações de fazer ou de não fazer. Da execução por quantia certa. Da execução contra a Fazenda Pública. Dos embargos à execução. Extinção do processo de execução. Exceção de pré-executividade."}, {"o": "TRF6", "n": "12", "t": "Do precedente", "c": "Do precedente. Da gestão de precedentes. Da ordem dos processos no tribunal. Incidente de assunção de competência. Incidente de resolução de demandas repetitivas. Incidente de arguição de inconstitucionalidade. Conflito de competência. Homologação de decisão estrangeira e da concessão do exequatur à carta rogatória. Ação rescisória e anulatória. Relativização da coisa julgada. Reclamação."}, {"o": "TRF6", "n": "13", "t": "Recursos", "c": "Recursos. Disposições gerais. Apelação. Agravo de instrumento. Agravo interno. Embargos de declaração. Recursos para o Supremo Tribunal Federal e em recurso especial e em recurso extraordinário. Repercussão Geral e Relevância da Questão Federal. Recursos Repetitivos. Embargos de divergência."}, {"o": "TRF6", "n": "14", "t": "Subsistema dos juizados especiais", "c": "Subsistema dos juizados especiais. Princípios informadores. Juizados Especiais Federais: competência, procedimento e recursos."}, {"o": "TRF6", "n": "15", "t": "Ações coletivas", "c": "Ações coletivas. Legitimidade ativa. Competência. Coisa julgada. Execução e cumprimento de sentença. Regras procedimentais aplicáveis."}, {"o": "TRF6", "n": "16", "t": "O CPC e o direito intertemporal", "c": "O CPC e o direito intertemporal."}]}, {"nome": "Direito Penal", "itens": [{"o": "TJSC", "n": "1", "t": "Direito Penal:", "c": "Direito Penal: conceito, funções e caracteres. Ciências Penais e disciplinas auxiliares;"}, {"o": "TJSC", "n": "2", "t": "Escolas e tendências penais:", "c": "Escolas e tendências penais: escola clássica, escola positiva, escola crítica, escola moderna alemã, escola penal humanista, escola técnico-jurídica, escola correcionalista, movimento de defesa social;"}, {"o": "TJSC", "n": "3", "t": "Principais fases da evolução epistemológica do Direito Penal:", "c": "Principais fases da evolução epistemológica do Direito Penal: positivismo, neokantismo, finalismo e ontologismo do finalismo de Welzel, pós-finalismo: normativismo funcionalista. Direito Penal do Inimigo;"}, {"o": "TJSC", "n": "4", "t": "Princípios Fundamentais do Direito Penal", "c": "Princípios Fundamentais do Direito Penal. Princípio da legalidade ou reserva legal. Princípio da dignidade da pessoa humana. Princípio da culpabilidade. Princípio da exclusiva proteção de bens jurídicos. Princípio da intervenção mínima e da fragmentariedade. Princípios da pessoalidade e da individualização da pena. Princípio da proporcionalidade. Princípio da humanidade. Princípio da adequação social. Princípio da insignificância;"}, {"o": "TJSC", "n": "5", "t": "Bem Jurídico-Penal:", "c": "Bem Jurídico-Penal: Conceito e delimitação. Bem jurídico individual e transindividual. Objeto do crime. Bem jurídico e função;"}, {"o": "TJSC", "n": "6", "t": "Teoria da lei penal", "c": "Teoria da lei penal. Fontes do Direito Penal: costume, jurisprudência e doutrina. Norma e lei penal: conceito e estrutura lógica da norma jurídico-penal. Lei penal em branco. Interpretação da lei penal. Aplicação da lei penal: argumento analógico, princípios gerais de direito e equidade."}, {"o": "TJSC", "n": "7", "t": "Âmbito temporal da lei penal:", "c": "Âmbito temporal da lei penal: irretroatividade e retroatividade da lei penal favorável. Lei excepcional ou temporária. Tempo do crime."}, {"o": "TJSC", "n": "8", "t": "Âmbito espacial da lei penal", "c": "Âmbito espacial da lei penal. Princípios Fundamentais. Conceito de território nacional. Lugar do delito. Extraterritorialidade: imunidade diplomática e imunidade parlamentar. Extradição: conceito e espécies. Princípios e condições. Limitações à extradição. Deportação e expulsão."}, {"o": "TJSC", "n": "9", "t": "Delito:", "c": "Delito: conceito formal, material ou analítico. Classificação dos delitos: delito de resultado, delito de mera atividade ou conduta, delito qualificado pelo resultado, delito de lesão, delito de perigo abstrato e concreto, delito comum, especial (próprio e impróprio), delito de mão própria, delito unissubsistente, delito plurissubsistente, delito pluriofensivo, delito instantâneo, permanente e instantâneo de efeitos permanentes, delito de dano, delito comissivo, delito omissivo próprio (puro) e omissivo impróprios (ou comissivos por omissão, ou comissivos-omissivos), delitos unissubjetivo, delito plurissubjetivo (coletivo, de concurso necessário), delitos de ação única, delitos de ação múltipla ou de conteúdo variado, delito complexo, delito progressivo ou de passagem, delito habitual;"}, {"o": "TJSC", "n": "10", "t": "Teorias da ação", "c": "Teorias da ação. Causas que excluem a ação e omissão. Relação de causalidade. Teorias. Superveniência de causa relativamente independente. Causação e imputação do resultado. Teorias. Estrutura do delito omissivo. Delito omissivo próprio. Delito omissivo impróprio;"}, {"o": "TJSC", "n": "11", "t": "Tipicidade", "c": "Tipicidade. Conceito de tipo. Tipicidade e ilicitude. Desvalor da ação, desvalor do resultado. Classificação estrutural dos tipos. Tipo de injusto de ação doloso: tipo objetivo e tipo subjetivo. Elemento subjetivo geral: o dolo. Elemento subjetivo do injusto (elemento subjetivo especial do tipo). Tipo de injusto de ação culposo. Conceito e elementos. Modalidades de culpa. Espécies de culpa. Princípio da confiança. Dolo eventual e culpa consciente. Erro de tipo. Conceito. Erro de tipo e erro de tipo permissivo. Erro de tipo escusável e inescusável. Erro acidental. Erro provocado por terceiro. Erro sobre o objeto. Erro na execução. Resultado diverso do pretendido;"}, {"o": "TJSC", "n": "12", "t": "Ilicitude ou antijuridicidade", "c": "Ilicitude ou antijuridicidade. Causas de justificação. Estado de necessidade: conceito, fundamento e requisitos. Legítima defesa: conceito, fundamento e requisitos. Estrito cumprimento de dever legal: conceito, fundamento, requisitos. Colisão de deveres. Exercício Regular de direito: conceito, fundamento e requisitos. Consentimento do ofendido: conceito, funções, fundamento e requisito;"}, {"o": "TJSC", "n": "13", "t": "Culpabilidade", "c": "Culpabilidade. Conceito. Evolução dogmática da culpabilidade. Conceito material de culpabilidade. Elementos da culpabilidade. Imputabilidade. Conceito. Causas de exclusão da imputabilidade. Imputabilidade diminuída. Embriaguez actio libera in causa. Consciência da ilicitude. Conceitos e teorias. Erro de proibição. Conceito e modalidades. Distinção entre erro de proibição e erro de tipo. Erro de proibição vencível e erro de proibição invencível. Exigibilidade de conduta diversa. Inexigibilidade. Hipóteses legais e supralegais de exculpação;"}, {"o": "TJSC", "n": "14", "t": "Etapas da realização do delito:", "c": "Etapas da realização do delito: consumação e tentativa. Conceito e elementos. Fundamento da punibilidade da tentativa. Preparação e execução. Desistência voluntária e arrependimento eficaz. Arrependimento posterior. Crime impossível. Crime impossível e delito putativo. Intervenção predisposta de autoridade e atuação do agente provocador;"}, {"o": "TJSC", "n": "15", "t": "Sujeitos do delito", "c": "Sujeitos do delito. Sujeito ativo e passivo. Responsabilidade penal da pessoa jurídica;"}, {"o": "TJSC", "n": "16", "t": "Concurso de pessoas", "c": "Concurso de pessoas. Autoria e participação: teorias, requisitos e divisão. Autoria e coautoria: conceito de autor. Autoria colateral Participação: conceitos, elementos e espécies de participação. Punibilidade no concurso de pessoas. Circunstâncias incomunicáveis;"}, {"o": "TJSC", "n": "17", "t": "Concurso de delitos", "c": "Concurso de delitos. Unidade e Pluralidade delitiva. Sistemas. Concurso material ou real. Concurso formal ou ideal. Crime continuado. Multas no concurso de delitos;"}, {"o": "TJSC", "n": "18", "t": "Teoria das Circunstâncias", "c": "Teoria das Circunstâncias. Circunstâncias judiciais. Circunstâncias legais. Circunstâncias legais. Circunstâncias agravantes. Reincidência. Conceito e elementos da reincidência. Espécies e efeitos da reincidência. Agravantes no concurso de pessoas. Circunstâncias atenuantes. Causas de aumento e de diminuição de pena. Qualificadoras;"}, {"o": "TJSC", "n": "19", "t": "Teorias da pena", "c": "Teorias da pena. Conceito. Espécies. Fundamentos e fins da pena. Teorias absolutas, relativas ou unitárias (ecléticas), Classificação das penas;"}, {"o": "TJSC", "n": "20", "t": "Sistemas penitenciários;", "c": "Sistemas penitenciários;"}, {"o": "TJSC", "n": "21", "t": "Princípios da Execução Penal:", "c": "Princípios da Execução Penal: Princípio da legalidade; Princípio do devido processo legal; princípio da humanidade; princípio da jurisdicionalidade; princípios do contraditório e da ampla defesa; princípio da publicidade. Objeto e aplicação da Lei de Execução Penal: Do objeto da execução penal; da jurisdição do Juízo da Execução; dos presos provisórios, condenados pela Justiça Eleitoral ou Militar; delitos não atingidos pela sentença ou pela lei; a comunidade como ente colaborador. Classificação dos condenados: exame de personalidade e exame criminológico. Assistência: assistência material, assistência à saúde, assistência educacional, assistência social, assistência religiosa, assistência ao egresso. Trabalho: trabalho interno e externo. Deveres e direitos do preso. Disciplina: Faltas disciplinares, regime disciplinar diferenciado, sanções, aplicação das sanções e procedimento disciplinar;"}, {"o": "TJSC", "n": "22", "t": "Órgãos da Execução Penal", "c": "Órgãos da Execução Penal. Conselho Nacional de Política Criminal e Penitenciaria. Juízo da Execução. Ministério Público. Conselho Penitenciário. Departamentos penitenciários. Departamento Penitenciário Nacional. Departamento Penitenciário local. Direção administrativa e de pessoal dos estabelecimentos penais. Patronato. Conselho da Comunidade. Defensoria Pública;"}, {"o": "TJSC", "n": "23", "t": "Estabelecimentos penais", "c": "Estabelecimentos penais. Penitenciária. Colônia agrícola, industrial ou similar. Casa do albergado. Centro de Observação. Hospital de Custódia e Tratamento Psiquiátrico. Cadeia Pública;"}, {"o": "TJSC", "n": "24", "t": "Penas privativas de liberdade e execução das penas em espécie:", "c": "Penas privativas de liberdade e execução das penas em espécie: Reclusão e Detenção. Guia de recolhimento. Cálculo de liquidação e soma das penas. Superveniência de doença mental. Regimes. Soma e unificação de pena, detração, remição e fixação de regime. Progressão de regime: requisito objetivo e subjetivo, progressão nos crimes hediondos ou equiparados, regime aberto. Progressão por saltos. Regressão de regime. Monitoração eletrônica. Permissão de saída prisional. Saída temporária. Requisitos para a concessão da saída temporária. Condições legais de fiscalização. Prazo para saída temporária. Revogação da saída temporária. Remição. Contagem do tempo remido. Decisão judicial. Perda do tempo remido. Tempo remido e benefícios;"}, {"o": "TJSC", "n": "25", "t": "Penas restritivas de direitos", "c": "Penas restritivas de direitos. Prestação pecuniária. Perda de bens e valores. Prestação de serviços à comunidade ou a entidades públicas. Interdição temporária de direitos: proibição do exercício de cargo, função ou atividade pública, bem como de mandado eletivo; proibição do exercício de profissão, atividade ou ofício que dependam de habilitação especial, de licença ou autorização do poder público; suspensão de autorização ou de habilitação para dirigir veículo; proibição de frequentar determinados lugares; proibição de inscrever-se em concurso, avaliação ou exames públicos. Limitação de fim de semana. Substituição. Conversão da pena na execução. Fiscalização e regras para execução;"}, {"o": "TJSC", "n": "26", "t": "Pena de multa", "c": "Pena de multa. Conceito. Natureza Jurídica. Sistemas de cominação de multa penal. Aplicação da pena de multa. Pagamento e parcelamento. Conversão e suspensão da pena de multa. Da prescrição da pena de multa na execução;"}, {"o": "TJSC", "n": "27", "t": "Determinação da pena", "c": "Determinação da pena. Conceitos e sistemas. Individualização legal, judicial e executória. Fixação da pena. Fixação da pena privativa de liberdade. Fixação da pena de multa;"}, {"o": "TJSC", "n": "28", "t": "Suspensão condicional da pena", "c": "Suspensão condicional da pena. Conceito e natureza jurídica. Sistemas. Requisitos. Espécies. Condições. Período de prova. Revogação. Prorrogação. Extinção. Competência;"}, {"o": "TJSC", "n": "29", "t": "Livramento condicional", "c": "Livramento condicional. Requisitos de ordem objetiva e subjetiva. Concessão do livramento. Condições. Carta de livramento, cerimônia, caderneta e pecúlio. Revogação obrigatória e facultativa. Efeitos da revogação. Modificação das condições. Suspensão do livramento. Prorrogação do período de prova e extinção da pena;"}, {"o": "TJSC", "n": "30", "t": "Medidas de Segurança", "c": "Medidas de Segurança. Conceito. Natureza jurídica. Pena e medida de segurança. Princípio da legalidade. Sistemas. Pressupostos de aplicação das medidas de segurança: prática de fato punível, periculosidade do autor, e ausência de imputabilidade plena. Espécies: internação em hospital de custódia e tratamento psiquiátrico, e tratamento ambulatorial. Locais de internação e tratamento. Duração das medidas de segurança. Exame de verificação da cessação de periculosidade. Desinternação ou liberação condicional. Medida de segurança substitutiva: semi-imputabilidade e superveniência de doença mental. Duração da medida de segurança substitutiva. Extinção da punibilidade e medidas de segurança. Direitos do internado;"}, {"o": "TJSC", "n": "31", "t": "Processo e procedimento judicial na execução penal", "c": "Processo e procedimento judicial na execução penal. Iniciativa. Procedimento. Videoconferência na execução penal. Agravo em execução;"}, {"o": "TJSC", "n": "32", "t": "Conversões na execução", "c": "Conversões na execução. Incidentes de execução. Conversões: pena privativa de liberdade em penas restritivas de direito; penas restritivas de direito em pena privativa de liberdade; impossibilidade de conversão da pena de multa; pena privativa de liberdade em medidas de segurança. Tratamento ambulatorial em internação;"}, {"o": "TJSC", "n": "33", "t": "Excesso ou desvio na execução", "c": "Excesso ou desvio na execução. Legitimidade para suscitar o incidente;"}, {"o": "TJSC", "n": "34", "t": "Efeitos da condenação", "c": "Efeitos da condenação. Conceito. Efeitos secundários penais. Efeitos secundários extrapenais: genéricos específicos. Reabilitação: conceito, condições, requisitos, efeitos e revogação;"}, {"o": "TJSC", "n": "35", "t": "Condições objetivas da punibilidade", "c": "Condições objetivas da punibilidade. Definição e natureza jurídica. Enumeração e efeitos. Escusas absolutórias. Conceito e denominação. Natureza jurídica;"}, {"o": "TJSC", "n": "36", "t": "Causas de extinção da punibilidade", "c": "Causas de extinção da punibilidade. Natureza jurídica e efeitos da extinção da punibilidade. Morte do agente. Anistia, graça e indulto. Abolitio criminis. Renúncia. Perdão do ofendido. Perdão judicial. Retratação. Decadência e perempção;"}, {"o": "TJSC", "n": "37", "t": "Prescrição", "c": "Prescrição. Conceito e fundamentos. Os prazos de prescrição e sua contagem. Espécies. Suspensão e interrupção da prescrição;"}, {"o": "TJSC", "n": "38", "t": "Dos crimes contra a pessoa;", "c": "Dos crimes contra a pessoa;"}, {"o": "TJSC", "n": "39", "t": "Dos crimes contra o patrimônio;", "c": "Dos crimes contra o patrimônio;"}, {"o": "TJSC", "n": "40", "t": "Dos crimes contra a propriedade imaterial;", "c": "Dos crimes contra a propriedade imaterial;"}, {"o": "TJSC", "n": "41", "t": "Dos crimes contra a organização do trabalho;", "c": "Dos crimes contra a organização do trabalho;"}, {"o": "TJSC", "n": "42", "t": "Dos crimes contra o sentimento religioso e contra o respeito aos mortos;", "c": "Dos crimes contra o sentimento religioso e contra o respeito aos mortos;"}, {"o": "TJSC", "n": "43", "t": "Dos crimes contra a dignidade sexual;", "c": "Dos crimes contra a dignidade sexual;"}, {"o": "TJSC", "n": "44", "t": "Dos crimes contra a família;", "c": "Dos crimes contra a família;"}, {"o": "TJSC", "n": "45", "t": "Dos crimes contra a incolumidade pública;", "c": "Dos crimes contra a incolumidade pública;"}, {"o": "TJSC", "n": "46", "t": "Dos crimes contra a paz pública;", "c": "Dos crimes contra a paz pública;"}, {"o": "TJSC", "n": "
